<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bubble Craps Trainer</title>
<style>
:root {
  --bg: #0a5c2a;
  --felt: #0d6b32;
  --felt-dark: #095525;
  --gold: #d4a843;
  --gold-light: #f0d078;
  --text: #f0e6d2;
  --text-dim: #b8a88a;
  --dice-bg: #fafafa;
  --dice-pip: #1a1a1a;
  --dice-pip-red: #c0392b;
  --correct: #27ae60;
  --wrong: #e74c3c;
  --btn-bg: #1a3a2a;
  --btn-hover: #2a5a3a;
  --chip-bg: #2c1810;
  --panel-bg: rgba(0,0,0,0.4);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --bet-pass: #1a5276;
  --bet-dont: #641e16;
  --bet-field: #7d6608;
  --bet-place: #0e6251;
  --bet-come: #4a235a;
  --bet-hard: #6e2c00;
  --bet-prop: #1b2631;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { height: 100%; height: 100dvh; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 500px;
  padding: 6px 12px 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.header h1 {
  font-size: 1.67rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--gold-light);
}
.header .stats {
  display: flex;
  gap: 10px;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.header .stats span { display:flex; align-items:center; gap:3px; }
.header .stats .val { color: var(--text); font-weight:600; }

/* ── Point Indicator ── */
.point-indicator {
  width: 100%;
  max-width: 500px;
  padding: 2px 12px;
  text-align: center;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
  min-height: 28px;
}
.point-indicator .point-puck {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.9rem;
  background: rgba(212,168,67,0.2);
  color: var(--gold-light);
  border: 1px solid rgba(212,168,67,0.3);
}
.point-indicator .point-puck.off {
  background: rgba(0,0,0,0.3);
  color: var(--text-dim);
  border-color: rgba(255,255,255,0.1);
}

/* ── Dice Area ── */
.dice-area {
  width: 100%;
  max-width: 500px;
  padding: 4px 12px;
  display: flex;
  justify-content: center;
  gap: 16px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
  min-height: 90px;
  align-items: center;
}
.die {
  width: 72px;
  height: 72px;
  background: var(--dice-bg);
  border-radius: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: 8px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  transition: transform 0.15s ease;
}
.die.rolling {
  animation: diceRoll 0.5s ease;
}
@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(90deg) scale(1.1); }
  50% { transform: rotate(180deg) scale(1.15); }
  75% { transform: rotate(270deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.pip {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--dice-pip);
  margin: auto;
}
.pip.red { background: var(--dice-pip-red); }
.pip.hidden { visibility: hidden; }

/* ── Message Area ── */
.message-area {
  width: 100%;
  max-width: 500px;
  padding: 2px 12px;
  text-align: center;
  min-height: 24px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.message {
  font-size: 1.28rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 8px;
  display: inline-block;
  transition: all 0.2s;
}
.message.win { background: rgba(39,174,96,0.3); color: #5dfc8e; }
.message.lose { background: rgba(231,76,60,0.3); color: #ff8a80; }
.message.info { background: rgba(212,168,67,0.2); color: var(--gold-light); }
.message.result { background: rgba(255,255,255,0.1); color: var(--text); }

/* ── Feedback Banner ── */
.feedback-banner {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 10px 14px;
  text-align: center;
  font-weight: 700;
  font-size: 1.1rem;
  border-radius: 0;
  animation: bannerIn 0.25s ease;
  position: relative;
  z-index: 2;
  flex-shrink: 0;
}
@keyframes bannerIn {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.feedback-banner.correct {
  background: #14532d;
  color: #5dfc8e;
  border-bottom: 2px solid #27ae60;
}
.feedback-banner.wrong {
  background: #7f1d1d;
  color: #ff8a80;
  border-bottom: 2px solid #e74c3c;
}
.feedback-banner .fb-icon { font-size: 1.1rem; }
.feedback-banner .fb-text { margin-left: 4px; }

/* ── Bet Table ── */
.bet-table {
  width: 100%;
  max-width: 500px;
  padding: 4px 8px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.bet-table-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
  grid-template-rows: auto auto auto auto auto;
  gap: 3px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 4px;
  border: 1px solid rgba(255,255,255,0.1);
}
.bet-cell {
  padding: 6px 4px;
  border-radius: 4px;
  text-align: center;
  font-size: 0.65rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.12s;
  min-height: 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border: 1px solid rgba(255,255,255,0.08);
}
.bet-cell:active { transform: scale(0.95); filter: brightness(1.3); }
.bet-cell .bet-label { line-height: 1.2; }
.bet-cell .bet-amount {
  font-size: 0.55rem;
  color: var(--gold-light);
  margin-top: 1px;
  min-height: 10px;
}
.bet-cell .bet-odds {
  font-size: 0.5rem;
  color: var(--text-dim);
  margin-top: 1px;
}
/* Bet cell colors */
.bet-cell.pass { background: var(--bet-pass); }
.bet-cell.dont { background: var(--bet-dont); }
.bet-cell.field { background: var(--bet-field); }
.bet-cell.place { background: var(--bet-place); }
.bet-cell.come { background: var(--bet-come); }
.bet-cell.hard { background: var(--bet-hard); }
.bet-cell.prop { background: var(--bet-prop); }
.bet-cell.has-bet {
  border-color: var(--gold-light);
  box-shadow: 0 0 6px rgba(212,168,67,0.4);
}

/* ── Active Bets Display ── */
.active-bets {
  width: 100%;
  max-width: 500px;
  padding: 2px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
  min-height: 20px;
}
.active-bet-tag {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.15);
  white-space: nowrap;
}
.active-bet-tag .tag-amount { color: var(--gold-light); font-weight: 600; }

/* ── Strategy Hint ── */
.strategy-hint {
  width: 100%;
  max-width: 500px;
  padding: 2px 12px;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-dim);
  position: relative;
  z-index: 1;
  min-height: 18px;
  flex-shrink: 0;
}

/* ── Action Buttons ── */
.actions {
  width: 100%;
  max-width: 500px;
  padding: 6px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.action-btn {
  padding: 14px 20px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.15);
  background: var(--btn-bg);
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 75px;
  min-height: 48px;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.action-btn:active {
  transform: scale(0.95);
  background: var(--btn-hover);
  border-color: var(--gold);
}
.action-btn:disabled {
  opacity: 0.35;
  pointer-events: none;
}
.action-btn.primary {
  background: var(--gold);
  color: #1a1a1a;
  border-color: var(--gold);
}
.action-btn.primary:active {
  background: var(--gold-light);
}

/* ── Chip Area ── */
.chip-area {
  width: 100%;
  max-width: 500px;
  padding: 4px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.chip-stack {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.chip {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  border: 3px dashed rgba(255,255,255,0.3);
  transition: all 0.15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.chip:active { transform: scale(0.9); }
.chip.chip-1  { background: #fafafa; color:#1a1a1a; border-color:#ccc; }
.chip.chip-5  { background: #e74c3c; color:#fff; border-color:#c0392b; }
.chip.chip-25 { background: #27ae60; color:#fff; border-color:#1e8449; }
.chip.chip-100{ background: #1a1a1a; color:#f0d078; border-color:#333; }
.chip.selected {
  border-style: solid;
  border-color: var(--gold-light);
  box-shadow: 0 0 12px rgba(212,168,67,0.5);
  transform: scale(1.1);
}
.bankroll {
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* ── Spacer ── */
.spacer {
  flex: 1;
  min-height: 2px;
  position: relative;
  z-index: 0;
}

/* ── Settings Panel ── */
.settings-toggle {
  position: fixed;
  top: calc(48px + var(--safe-top));
  right: 12px;
  z-index: 10;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--panel-bg);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-dim);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.settings-panel {
  position: fixed;
  top: 0; right: 0;
  width: 280px;
  max-width: 90vw;
  height: 100%;
  height: 100dvh;
  background: #0a1a10;
  z-index: 20;
  padding: 20px;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
  border-left: 1px solid rgba(255,255,255,0.1);
}
.settings-panel.open { transform: translateX(0); }
.settings-panel h3 {
  font-size: 1rem;
  color: var(--gold-light);
  margin-bottom: 16px;
}
.settings-panel label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 4px;
  margin-top: 12px;
}
.settings-panel select, .settings-panel input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: var(--btn-bg);
  color: var(--text);
  font-size: 0.9rem;
}
.settings-panel .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 15;
  display: none;
}
.overlay.show { display: block; }

/* ── Add to Home Screen Banner ── */
.add-to-home {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 0.75rem;
  z-index: 30;
  display: none;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.2);
  max-width: 90vw;
}
.add-to-home .close-ath {
  position: absolute;
  top: 4px;
  right: 8px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.9rem;
  cursor: pointer;
}

/* ── Responsive ── */
@media (max-width: 380px) {
  .die { width: 60px; height: 60px; padding: 6px; }
  .pip { width: 11px; height: 11px; }
  .action-btn { padding: 12px 14px; font-size: 0.8rem; min-width: 65px; min-height: 44px; }
  .chip { width: 42px; height: 42px; font-size: 0.7rem; }
  .header h1 { font-size: 0.9rem; }
  .header .stats { gap: 6px; font-size: 0.6rem; }
  .bet-cell { font-size: 0.55rem; padding: 4px 2px; min-height: 30px; }
  .bet-cell .bet-amount { font-size: 0.5rem; }
  .bet-cell .bet-odds { font-size: 0.45rem; }
}
@media (min-width: 370px) and (max-height: 670px) {
  .die { width: 64px; height: 64px; padding: 7px; }
  .pip { width: 12px; height: 12px; }
  .bet-cell { min-height: 32px; }
}
@media (min-width: 390px) {
  .die { width: 76px; height: 76px; padding: 9px; }
  .pip { width: 15px; height: 15px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🎲 Bubble Craps Trainer</h1>
  <div class="stats">
    <span>✓<span class="val" id="correct-count">0</span></span>
    <span>✗<span class="val" id="wrong-count">0</span></span>
    <span>📊<span class="val" id="accuracy">--</span></span>
  </div>
</div>

<button class="settings-toggle" id="settings-toggle" title="Settings">⚙</button>
<div class="overlay" id="overlay"></div>
<div class="settings-panel" id="settings-panel">
  <button class="close-btn" id="close-settings">✕</button>
  <h3>⚙ Settings</h3>
  <label>Starting Bankroll</label>
  <input type="number" id="start-bankroll" value="1000" min="100" step="100">
  <label>Odds Multiplier</label>
  <select id="odds-mult">
    <option value="1">1x Odds</option>
    <option value="2">2x Odds</option>
    <option value="345" selected>3-4-5x Odds</option>
    <option value="5">5x Odds</option>
    <option value="10">10x Odds</option>
  </select>
  <label>Field 12 Pays</label>
  <select id="field-12-pays">
    <option value="3" selected>3:1 (Triple)</option>
    <option value="2">2:1 (Double)</option>
  </select>
  <label>Show Strategy Hint</label>
  <select id="show-hint">
    <option value="after" selected>After Decision</option>
    <option value="never">Never</option>
    <option value="always">Always (Cheat Mode)</option>
  </select>
  <br>
  <button class="action-btn primary" id="reset-game" style="width:100%">🔄 New Game</button>
  <br><br>
  <a class="action-btn" href="../" style="width:100%;display:block;text-align:center;text-decoration:none">← Back to Launcher</a>
</div>

<div class="point-indicator">
  <span class="point-puck off" id="point-puck">🎯 Point: OFF</span>
</div>

<div class="dice-area" id="dice-area">
  <div class="die" id="die1"></div>
  <div class="die" id="die2"></div>
</div>

<div class="message-area">
  <div class="message info" id="message">Place your bets &amp; roll!</div>
</div>

<div class="bet-table" id="bet-table">
  <div class="bet-table-grid" id="bet-grid"></div>
</div>

<div class="active-bets" id="active-bets"></div>

<div class="strategy-hint" id="strategy-hint"></div>

<div class="spacer"></div>

<div class="actions" id="actions">
  <button class="action-btn primary" id="roll-btn" onclick="rollDice()">🎲 Roll</button>
  <button class="action-btn" id="clear-bets-btn" onclick="clearAllBets()">Clear Bets</button>
  <button class="action-btn primary" id="new-round-btn" style="display:none" onclick="newRound()">🔄 New Come-Out</button>
</div>

<div class="chip-area" id="chip-area">
  <div class="bankroll" id="bankroll-display">Bankroll: $1,000</div>
</div>
<div class="chip-area">
  <div class="chip-stack" id="chips">
    <div class="chip chip-1" onclick="selectChip(1)">$1</div>
    <div class="chip chip-5 selected" onclick="selectChip(5)">$5</div>
    <div class="chip chip-25" onclick="selectChip(25)">$25</div>
    <div class="chip chip-100" onclick="selectChip(100)">$100</div>
  </div>
</div>

<div class="add-to-home" id="add-to-home-banner">
  <button class="close-ath" onclick="dismissATH()">✕</button>
  📱 Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> for full-screen play!
</div>

<script>
// ═══════════════════════════════════════════
// BUBBLE CRAPS TRAINER ENGINE
// ═══════════════════════════════════════════

// ── Payout Tables ──
const PLACE_PAYOUTS = { 4: [9,5], 5: [7,5], 6: [7,6], 8: [7,6], 9: [7,5], 10: [9,5] };
const ODDS_PAYOUTS = { 4: [2,1], 5: [3,2], 6: [6,5], 8: [6,5], 9: [3,2], 10: [2,1] };
const DONT_ODDS_PAYOUTS = { 4: [1,2], 5: [2,3], 6: [5,6], 8: [5,6], 9: [2,3], 10: [1,2] };
const HARDWAY_PAYOUTS = { 4: [7,1], 6: [9,1], 8: [9,1], 10: [7,1] };
const PROP_PAYOUTS = {
  any7: [4,1], anyCraps: [7,1], two: [30,1], twelve: [30,1],
  three: [15,1], eleven: [15,1],
};

// ── Game State ──
let state = {
  bankroll: 1000,
  selectedChip: 5,
  showHint: 'after',
  oddsMult: '345',     // '1','2','345','5','10'
  field12Pays: 3,      // 3 or 2
  
  dice: [1, 1],
  phase: 'comeout',    // 'comeout', 'point', 'roll_over'
  point: null,         // 4,5,6,8,9,10 or null
  roundNum: 0,
  
  bets: {},            // { 'pass': 10, 'dontpass': 5, 'field': 5, 'place_6': 6, 'come': 10, ... }
  oddsBets: {},        // { 'pass_odds': 20, 'come_4_odds': 10, ... }
  comePoints: {},      // { 'come_4': 10, 'come_6': 5 } — come bets that have established points
  
  stats: { correct:0, wrong:0, total:0 },
  lastDecision: null,
  feedbackTimer: null,
};

// ── DOM refs ──
const $ = id => document.getElementById(id);
let die1El, die2El, messageEl, pointPuckEl, betGridEl, activeBetsEl;
let strategyHintEl, correctCountEl, wrongCountEl, accuracyEl;
let bankrollDisplayEl, rollBtn, clearBetsBtn, newRoundBtn, chipAreaEl;

function resolveDOM() {
  die1El = $('die1');
  die2El = $('die2');
  messageEl = $('message');
  pointPuckEl = $('point-puck');
  betGridEl = $('bet-grid');
  activeBetsEl = $('active-bets');
  strategyHintEl = $('strategy-hint');
  correctCountEl = $('correct-count');
  wrongCountEl = $('wrong-count');
  accuracyEl = $('accuracy');
  bankrollDisplayEl = $('bankroll-display');
  rollBtn = $('roll-btn');
  clearBetsBtn = $('clear-bets-btn');
  newRoundBtn = $('new-round-btn');
  chipAreaEl = $('chip-area');
}

// ── Settings ──
function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('craps_trainer_settings') || '{}');
    if (saved.bankroll) state.bankroll = saved.bankroll;
    if (saved.oddsMult) state.oddsMult = saved.oddsMult;
    if (saved.field12Pays) state.field12Pays = saved.field12Pays;
    if (saved.showHint) state.showHint = saved.showHint;
  } catch(e) {}
  try { $('start-bankroll').value = state.bankroll; } catch(e) {}
  try { $('odds-mult').value = state.oddsMult; } catch(e) {}
  try { $('field-12-pays').value = String(state.field12Pays); } catch(e) {}
  try { $('show-hint').value = state.showHint; } catch(e) {}
}

function saveSettings() {
  localStorage.setItem('craps_trainer_settings', JSON.stringify({
    bankroll: state.bankroll,
    oddsMult: state.oddsMult,
    field12Pays: state.field12Pays,
    showHint: state.showHint,
  }));
}

// ── Dice Rendering ──
// Pip positions for each face (1-6) using a 3x3 grid
// Grid cells: top-left(0), top-center(1), top-right(2), mid-left(3), mid-center(4), mid-right(5), bot-left(6), bot-center(7), bot-right(8)
const DICE_FACES = {
  1: [4],                          // center only
  2: [0, 8],                       // top-left, bot-right
  3: [0, 4, 8],                    // diagonal
  4: [0, 2, 6, 8],                 // corners
  5: [0, 2, 4, 6, 8],             // corners + center
  6: [0, 2, 3, 5, 6, 8],          // two columns
};

function renderDie(el, value, rolling = false) {
  el.innerHTML = '';
  el.classList.toggle('rolling', rolling);
  const face = DICE_FACES[value];
  for (let i = 0; i < 9; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (!face.includes(i)) {
      pip.classList.add('hidden');
    }
    // Red pip for the 1-face center pip (traditional)
    if (value === 1 && i === 4) {
      pip.classList.add('red');
    }
    el.appendChild(pip);
  }
}

function renderDice(rolling = false) {
  renderDie(die1El, state.dice[0], rolling);
  renderDie(die2El, state.dice[1], rolling);
}

function diceTotal() {
  return state.dice[0] + state.dice[1];
}

function isHardway() {
  return state.dice[0] === state.dice[1] && (state.dice[0] === 2 || state.dice[0] === 3 || state.dice[0] === 4 || state.dice[0] === 5);
}

function placeBetOn(betId) {
  // Can't place bets during roll_over
  if (state.phase === 'roll_over') return;
  
  const amount = state.selectedChip;
  if (state.bankroll < amount) return;
  
  // Validate bet placement based on phase
  if (state.phase === 'point') {
    // During point phase: can't place Pass/Don't Pass (already set)
    // Can place Come/Don't Come, Place bets, Field, Hardways, Props
    // Can also add odds to existing Pass/Don't Pass
    if (betId === 'pass' || betId === 'dontpass') return;
  }
  
  // Odds bets are handled separately — if user taps pass/dontpass during point phase,
  // we add odds instead
  if (state.phase === 'point' && (betId === 'pass' || betId === 'dontpass')) {
    addOddsBet(betId);
    return;
  }
  
  // Check max odds for come point odds
  if (betId.startsWith('come_') && betId.includes('_odds')) {
    addComeOddsBet(betId);
    return;
  }
  
  state.bankroll -= amount;
  state.bets[betId] = (state.bets[betId] || 0) + amount;
  
  // Track strategy
  checkBetStrategy(betId);
  
  renderAll();
}

function addOddsBet(lineBetId) {
  if (state.phase !== 'point' || !state.point) return;
  
  const baseBet = state.bets[lineBetId] || 0;
  if (baseBet <= 0) return;
  
  const maxOdds = getMaxOdds(state.point, baseBet);
  const currentOdds = state.oddsBets[lineBetId + '_odds'] || 0;
  const amount = state.selectedChip;
  
  if (currentOdds + amount > maxOdds) return;
  if (state.bankroll < amount) return;
  
  state.bankroll -= amount;
  state.oddsBets[lineBetId + '_odds'] = currentOdds + amount;
  
  // Taking odds is always correct strategy
  recordDecision(true, 'Taking odds is the best bet in the casino');
  
  renderAll();
}

function addComeOddsBet(oddsKey) {
  // oddsKey like 'come_4_odds'
  const parts = oddsKey.split('_');
  const comePoint = parseInt(parts[1]);
  const comeKey = 'come_' + comePoint;
  const baseBet = state.comePoints[comeKey] || 0;
  if (baseBet <= 0) return;
  
  const maxOdds = getMaxOdds(comePoint, baseBet);
  const currentOdds = state.oddsBets[oddsKey] || 0;
  const amount = state.selectedChip;
  
  if (currentOdds + amount > maxOdds) return;
  if (state.bankroll < amount) return;
  
  state.bankroll -= amount;
  state.oddsBets[oddsKey] = currentOdds + amount;
  
  recordDecision(true, 'Taking odds is the best bet in the casino');
  
  renderAll();
}

function getMaxOdds(point, baseBet) {
  const mult = state.oddsMult;
  if (mult === '1') return baseBet;
  if (mult === '2') return baseBet * 2;
  if (mult === '5') return baseBet * 5;
  if (mult === '10') return baseBet * 10;
  // 3-4-5x: 3x on 4/10, 4x on 5/9, 5x on 6/8
  if (point === 4 || point === 10) return baseBet * 3;
  if (point === 5 || point === 9) return baseBet * 4;
  return baseBet * 5; // 6 or 8
}

// ── Strategy Engine ──
function getBetQuality(betId) {
  // Returns { correct: bool, reason: str }
  const good = { correct: true, reason: '' };
  const bad = { correct: false, reason: '' };
  
  switch (betId) {
    case 'pass':
      return { ...good, reason: 'Pass Line: low house edge (~1.41%), best with odds' };
    case 'dontpass':
      return { ...good, reason: "Don't Pass: slightly better edge (~1.36%), best with odds" };
    case 'come':
      return { ...good, reason: 'Come bet: same low edge as Pass Line' };
    case 'dontcome':
      return { ...good, reason: "Don't Come: same low edge as Don't Pass" };
    case 'place_6':
    case 'place_8':
      return { ...good, reason: 'Place 6/8: decent bet (~1.52% house edge)' };
    case 'place_5':
    case 'place_9':
      return { ...bad, reason: 'Place 5/9: higher edge (~4%). Prefer Come/Pass instead.' };
    case 'place_4':
    case 'place_10':
      return { ...bad, reason: 'Place 4/10: high edge (~6.67%). Avoid or use Come instead.' };
    case 'field':
      return { ...bad, reason: 'Field bet: high house edge (~5.56%). Avoid.' };
    case 'hard_4':
    case 'hard_6':
    case 'hard_8':
    case 'hard_10':
      return { ...bad, reason: 'Hardways: high house edge (9-11%). Avoid.' };
    case 'any7':
      return { ...bad, reason: 'Any 7: terrible edge (~16.67%). Never bet this.' };
    case 'anycraps':
      return { ...bad, reason: 'Any Craps: bad edge (~11.1%). Avoid.' };
    case 'prop_2':
    case 'prop_3':
    case 'prop_11':
    case 'prop_12':
      return { ...bad, reason: 'One-roll prop bets: terrible edge (11-16%). Never bet these.' };
    default:
      return { ...bad, reason: 'Proposition bets have high house edge. Avoid.' };
  }
}

function checkBetStrategy(betId) {
  const quality = getBetQuality(betId);
  recordDecision(quality.correct, quality.reason);
}

function recordDecision(correct, reason) {
  state.lastDecision = { correct, reason };
  if (correct) state.stats.correct++;
  else state.stats.wrong++;
  state.stats.total++;
}

function showFeedback(correct, reason) {
  clearFeedbackBanner();
  
  const banner = document.createElement('div');
  banner.className = 'feedback-banner';
  banner.id = 'feedback-banner';
  
  if (correct) {
    banner.classList.add('correct');
    banner.innerHTML = `<span class="fb-icon">✅</span> <span class="fb-text">Good bet! ${reason}</span>`;
  } else {
    banner.classList.add('wrong');
    banner.innerHTML = `<span class="fb-icon">❌</span> <span class="fb-text">Bad bet. ${reason}</span>`;
  }
  
  const betTable = document.querySelector('.bet-table');
  if (betTable && betTable.parentNode) {
    betTable.parentNode.insertBefore(banner, betTable);
  }
  
  state.feedbackTimer = setTimeout(() => {
    const fb = $('feedback-banner');
    if (fb) fb.remove();
  }, 3000);
}

function clearFeedbackBanner() {
  if (state.feedbackTimer) {
    clearTimeout(state.feedbackTimer);
    state.feedbackTimer = null;
  }
  const fb = $('feedback-banner');
  if (fb) fb.remove();
}

  activeBetsEl.innerHTML = '';
  
  const allBets = [];
  
  // Line bets
  for (const [key, amount] of Object.entries(state.bets)) {
    if (amount > 0) {
      const label = getBetLabel(key);
      allBets.push({ key, label, amount });
    }
  }
  
  // Odds bets
  for (const [key, amount] of Object.entries(state.oddsBets)) {
    if (amount > 0) {
      const label = getOddsLabel(key);
      allBets.push({ key, label, amount, isOdds: true });
    }
  }
  
  // Come point bets
  for (const [key, amount] of Object.entries(state.comePoints)) {
    if (amount > 0) {
      const pointNum = key.split('_')[1];
      allBets.push({ key, label: `Come ${pointNum}`, amount });
      // Also show odds on this come point
      const oddsKey = `come_${pointNum}_odds`;
      const oddsAmt = state.oddsBets[oddsKey] || 0;
      if (oddsAmt > 0) {
        allBets.push({ key: oddsKey, label: `Come ${pointNum} Odds`, amount: oddsAmt, isOdds: true });
      }
    }
  }
  
  if (allBets.length === 0) {
    activeBetsEl.innerHTML = '<span style="font-size:0.7rem;color:var(--text-dim)">No active bets</span>';
    return;
  }
  
  allBets.forEach(b => {
    const tag = document.createElement('span');
    tag.className = 'active-bet-tag';
    tag.innerHTML = `${b.label} <span class="tag-amount">$${b.amount}</span>`;
    if (b.isOdds) tag.style.borderColor = 'rgba(212,168,67,0.4)';
    activeBetsEl.appendChild(tag);
  });
}

function getBetLabel(key) {
  const labels = {
    'pass': 'Pass Line', 'dontpass': "Don't Pass",
    'come': 'Come', 'dontcome': "Don't Come",
    'field': 'Field',
    'place_4': 'Place 4', 'place_5': 'Place 5', 'place_6': 'Place 6',
    'place_8': 'Place 8', 'place_9': 'Place 9', 'place_10': 'Place 10',
    'hard_4': 'Hard 4', 'hard_6': 'Hard 6', 'hard_8': 'Hard 8', 'hard_10': 'Hard 10',
    'any7': 'Any 7', 'anycraps': 'Any Craps',
    'prop_2': 'Bet on 2', 'prop_3': 'Bet on 3', 'prop_11': 'Bet on 11', 'prop_12': 'Bet on 12',
  };
  return labels[key] || key;
}

function getOddsLabel(key) {
  if (key === 'pass_odds') return 'Pass Odds';
  if (key === 'dontpass_odds') return "Don't Pass Odds";
  if (key.startsWith('come_') && key.endsWith('_odds')) {
    const parts = key.split('_');
    return `Come ${parts[1]} Odds`;
  }
  return key;
}

function renderActions() {
  if (state.phase === 'roll_over') {
    rollBtn.style.display = 'none';
    clearBetsBtn.style.display = 'none';
    newRoundBtn.style.display = '';
  } else {
    rollBtn.style.display = '';

  }

  const hasBets = Object.values(state.bets).some(v => v > 0) ||
                  Object.values(state.oddsBets).some(v => v > 0) ||
                  Object.values(state.comePoints).some(v => v > 0);
  rollBtn.disabled = !hasBets && state.phase === 'comeout';

// ── Clear Bets ──
function clearAllBets() {
  if (state.phase === 'roll_over') return;
  
  // Refund all bets
  for (const [key, amount] of Object.entries(state.bets)) {
    state.bankroll += amount;
  }
  for (const [key, amount] of Object.entries(state.oddsBets)) {
    state.bankroll += amount;
  }
  for (const [key, amount] of Object.entries(state.comePoints)) {
    state.bankroll += amount;
  }
  
  state.bets = {};
  state.oddsBets = {};
  state.comePoints = {};
  
  renderAll();
}

// ── Roll Dice ──
function rollDice() {
  if (state.phase === 'roll_over') return;
  
  clearFeedbackBanner();
  
  // Generate random dice
  state.dice = [
    Math.floor(Math.random() * 6) + 1,
    Math.floor(Math.random() * 6) + 1
  ];
  
  const total = diceTotal();
  
  // Animate
  renderDice(true);
  
  // Show strategy hint before resolving
  if (state.showHint === 'always') {
    showCheatHint();
  }
  
  setTimeout(() => {
    renderDice(false);
    resolveRoll(total);
  }, 500);
}

function showCheatHint() {
  if (state.phase === 'comeout') {
    strategyHintEl.textContent = '💡 Come-out: Bet Pass Line (or Don\'t Pass). Avoid prop bets.';
  } else {
    strategyHintEl.textContent = '💡 Point phase: Take max odds on Pass/Come. Place 6/8 are OK. Avoid hardways/field.';
  }
}

// ── Resolve Roll ──
function resolveRoll(total) {
  const d1 = state.dice[0];
  const d2 = state.dice[1];
  const hard = isHardway();
  const hardNum = hard ? d1 * 2 : null;
  
  let results = [];
  let netChange = 0;
  
  if (state.phase === 'comeout') {
    // ── COME-OUT ROLL ──
    
    // Pass Line
    if (state.bets.pass) {
      if (total === 7 || total === 11) {
        // Natural win
        const win = state.bets.pass;
        state.bankroll += win * 2; // return bet + win
        netChange += win;
        results.push(`Pass Line wins! +$${win}`);
        delete state.bets.pass;
        delete state.oddsBets.pass_odds;
      } else if (total === 2 || total === 3 || total === 12) {
        // Craps — lose
        netChange -= state.bets.pass;
        results.push(`Pass Line loses (craps). -$${state.bets.pass}`);
        delete state.bets.pass;
        delete state.oddsBets.pass_odds;
      } else {
        // Point established — bet stays
        results.push(`Pass Line: point is ${total}`);
      }
    }
    
    // Don't Pass
    if (state.bets.dontpass) {
      if (total === 2 || total === 3) {
        // Win
        const win = state.bets.dontpass;
        state.bankroll += win * 2;
        netChange += win;
        results.push(`Don't Pass wins! +$${win}`);
        delete state.bets.dontpass;
        delete state.oddsBets.dontpass_odds;
      } else if (total === 7 || total === 11) {
        // Lose
        netChange -= state.bets.dontpass;
        results.push(`Don't Pass loses. -$${state.bets.dontpass}`);
        delete state.bets.dontpass;
        delete state.oddsBets.dontpass_odds;
      } else if (total === 12) {
        // Push
        state.bankroll += state.bets.dontpass;
        results.push(`Don't Pass pushes on 12.`);
        delete state.bets.dontpass;
        delete state.oddsBets.dontpass_odds;
      } else {
        // Point established — bet stays
        results.push(`Don't Pass: point is ${total}`);
      }
    }
    
    // Field bet (one-roll)
    if (state.bets.field) {
      const fieldResult = resolveField(total);
      netChange += fieldResult.net;
      results.push(fieldResult.msg);
      delete state.bets.field;
    }
    
    // Hardways (one-roll on come-out? Actually hardways stay up, but resolve if hit)
    resolveHardways(total, hard, hardNum, results, netChange);
    
    // Proposition bets (one-roll)
    resolveProps(total, d1, d2, results, netChange);
    
    // Come bet (placed during come-out? Unusual but allowed)
    if (state.bets.come) {
      resolveComeOnRoll(total, results, netChange);
    }
    
    // Don't Come
    if (state.bets.dontcome) {
      resolveDontComeOnRoll(total, results, netChange);
    }
    
    // Place bets — not active during come-out (they're "off" by default)
    // We'll treat them as off on come-out
    
    // Set point if applicable
    if (total === 4 || total === 5 || total === 6 || total === 8 || total === 9 || total === 10) {
      state.point = total;
      state.phase = 'point';
    } else {
      // 7, 11, 2, 3, 12 — round over, new come-out
      state.phase = 'roll_over';
    }
    
  } else if (state.phase === 'point') {
    // ── POINT PHASE ROLL ──
    
    if (total === 7) {
      // Seven-out!
      results.push('🎲 SEVEN OUT!');
      
      // Pass Line loses
      if (state.bets.pass) {
        netChange -= state.bets.pass;
        results.push(`Pass Line loses. -$${state.bets.pass}`);
        delete state.bets.pass;
      }
      // Pass odds lose
      if (state.oddsBets.pass_odds) {
        netChange -= state.oddsBets.pass_odds;
        results.push(`Pass Odds lose. -$${state.oddsBets.pass_odds}`);
        delete state.oddsBets.pass_odds;
      }
      
      // Don't Pass wins
      if (state.bets.dontpass) {
        const win = state.bets.dontpass;
        state.bankroll += win * 2;
        netChange += win;
        results.push(`Don't Pass wins! +$${win}`);
        delete state.bets.dontpass;
      }
      // Don't Pass odds win (lay odds)
      if (state.oddsBets.dontpass_odds) {
        const oddsWin = calcDontOddsWin(state.point, state.oddsBets.dontpass_odds);
        state.bankroll += state.oddsBets.dontpass_odds + oddsWin;
        netChange += oddsWin;
        results.push(`Don't Pass Odds win! +$${oddsWin}`);
        delete state.oddsBets.dontpass_odds;
      }
      
      // Come bets lose
      for (const [key, amount] of Object.entries(state.comePoints)) {
        netChange -= amount;
        results.push(`Come ${key.split('_')[1]} loses. -$${amount}`);
      }
      // Come odds lose
      for (const [key, amount] of Object.entries(state.oddsBets)) {
        if (key.startsWith('come_') && key.endsWith('_odds')) {
          netChange -= amount;
          results.push(`${getOddsLabel(key)} loses. -$${amount}`);
        }
      }
      state.comePoints = {};
      // Clean come odds
      for (const key of Object.keys(state.oddsBets)) {
        if (key.startsWith('come_') && key.endsWith('_odds')) {
          delete state.oddsBets[key];
        }
      }
      
      // Don't Come wins (those that established points)
      // (We don't track DC points separately for simplicity — DC bets resolve on come-out roll)
      
      // Place bets lose on 7
      for (const [key, amount] of Object.entries(state.bets)) {
        if (key.startsWith('place_')) {
          netChange -= amount;
          results.push(`${getBetLabel(key)} loses. -$${amount}`);
          delete state.bets[key];
        }
      }
      
      // Hardways lose on 7 (unless it's a hardway 7 which doesn't exist)
      for (const [key, amount] of Object.entries(state.bets)) {
        if (key.startsWith('hard_')) {
          netChange -= amount;
          results.push(`${getBetLabel(key)} loses. -$${amount}`);
          delete state.bets[key];
        }
      }
      
      // Field bet (one-roll)
      if (state.bets.field) {
        const fieldResult = resolveField(total);
        netChange += fieldResult.net;
        results.push(fieldResult.msg);
        delete state.bets.field;
      }
      
      // Props
      resolveProps(total, d1, d2, results, netChange);
      
      // Any pending Come/Don't Come bets
      if (state.bets.come) {
        // Come bet on 7: wins!
        const win = state.bets.come;
        state.bankroll += win * 2;
        netChange += win;
        results.push(`Come bet wins on 7! +$${win}`);
        delete state.bets.come;
      }
      if (state.bets.dontcome) {
        // Don't Come on 7: loses
        netChange -= state.bets.dontcome;
        results.push(`Don't Come loses on 7. -$${state.bets.dontcome}`);
        delete state.bets.dontcome;
      }
      
      state.point = null;
      state.phase = 'roll_over';
      
    } else if (total === state.point) {
      // Point hit!
      results.push(`🎯 POINT HIT! ${total}!`);
      
      // Pass Line wins
      if (state.bets.pass) {
        const win = state.bets.pass;
        state.bankroll += win * 2;
        netChange += win;
        results.push(`Pass Line wins! +$${win}`);
        delete state.bets.pass;
      }
      // Pass odds win
      if (state.oddsBets.pass_odds) {
        const oddsWin = calcOddsWin(state.point, state.oddsBets.pass_odds);
        state.bankroll += state.oddsBets.pass_odds + oddsWin;
        netChange += oddsWin;
        results.push(`Pass Odds win! +$${oddsWin}`);
        delete state.oddsBets.pass_odds;
      }
      
      // Don't Pass loses
      if (state.bets.dontpass) {
        netChange -= state.bets.dontpass;
        results.push(`Don't Pass loses. -$${state.bets.dontpass}`);
        delete state.bets.dontpass;
      }
      if (state.oddsBets.dontpass_odds) {
        netChange -= state.oddsBets.dontpass_odds;
        results.push(`Don't Pass Odds lose. -$${state.oddsBets.dontpass_odds}`);
        delete state.oddsBets.dontpass_odds;
      }
      
      // Come point bets: check if any match the point
      for (const [key, amount] of Object.entries(state.comePoints)) {
        const cpNum = parseInt(key.split('_')[1]);
        if (cpNum === total) {
          // This come bet wins
          state.bankroll += amount * 2;
          netChange += amount;
          results.push(`Come ${cpNum} wins! +$${amount}`);
          delete state.comePoints[key];
          // Come odds win
          const oddsKey = `come_${cpNum}_odds`;
          if (state.oddsBets[oddsKey]) {
            const oddsWin = calcOddsWin(cpNum, state.oddsBets[oddsKey]);
            state.bankroll += state.oddsBets[oddsKey] + oddsWin;
            netChange += oddsWin;
            results.push(`Come ${cpNum} Odds win! +$${oddsWin}`);
            delete state.oddsBets[oddsKey];
          }
        }
      }
      
      // Place bets: check if this number hits
      for (const [key, amount] of Object.entries(state.bets)) {
        if (key.startsWith('place_')) {
          const placeNum = parseInt(key.split('_')[1]);
          if (placeNum === total) {
            const placeWin = calcPlaceWin(placeNum, amount);
            state.bankroll += amount + placeWin;
            netChange += placeWin;
            results.push(`Place ${placeNum} wins! +$${placeWin}`);
            // Place bets stay up (don't delete)
          }
        }
      }
      
      // Hardways
      resolveHardways(total, hard, hardNum, results, netChange);
      
      // Field
      if (state.bets.field) {
        const fieldResult = resolveField(total);
        netChange += fieldResult.net;
        results.push(fieldResult.msg);
        delete state.bets.field;
      }
      
      // Props
      resolveProps(total, d1, d2, results, netChange);
      
      // Pending Come/Don't Come bets
      if (state.bets.come) {
        resolveComeOnRoll(total, results, netChange);
      }
      if (state.bets.dontcome) {
        resolveDontComeOnRoll(total, results, netChange);
      }
      
      state.point = null;
      state.phase = 'roll_over';
      
    } else {
      // Neither 7 nor point — continue rolling
      
      // Field bet (one-roll)
      if (state.bets.field) {
        const fieldResult = resolveField(total);
        netChange += fieldResult.net;
        results.push(fieldResult.msg);
        delete state.bets.field;
      }
      
      // Hardways
      resolveHardways(total, hard, hardNum, results, netChange);
      
      // Props
      resolveProps(total, d1, d2, results, netChange);
      
      // Place bets: check if this number hits
      for (const [key, amount] of Object.entries(state.bets)) {
        if (key.startsWith('place_')) {
          const placeNum = parseInt(key.split('_')[1]);
          if (placeNum === total) {
            const placeWin = calcPlaceWin(placeNum, amount);
            state.bankroll += amount + placeWin;
            netChange += placeWin;
            results.push(`Place ${placeNum} wins! +$${placeWin}`);
          }
        }
      }
      
      // Come point bets: check if any match
      for (const [key, amount] of Object.entries(state.comePoints)) {
        const cpNum = parseInt(key.split('_')[1]);
        if (cpNum === total) {
          state.bankroll += amount * 2;
          netChange += amount;
          results.push(`Come ${cpNum} wins! +$${amount}`);
          delete state.comePoints[key];
          const oddsKey = `come_${cpNum}_odds`;
          if (state.oddsBets[oddsKey]) {
            const oddsWin = calcOddsWin(cpNum, state.oddsBets[oddsKey]);
            state.bankroll += state.oddsBets[oddsKey] + oddsWin;
            netChange += oddsWin;
            results.push(`Come ${cpNum} Odds win! +$${oddsWin}`);
            delete state.oddsBets[oddsKey];
          }
        }
      }
      
      // Pending Come/Don't Come bets
      if (state.bets.come) {
        resolveComeOnRoll(total, results, netChange);
      }
      if (state.bets.dontcome) {
        resolveDontComeOnRoll(total, results, netChange);
      }
      
      // Still in point phase
      results.push(`Rolling... point is still ${state.point}`);
    }
  }
  
  // Update message
  const resultMsg = results.join(' | ');
  const netSymbol = netChange >= 0 ? '+' : '';
  
  if (state.phase === 'roll_over') {
    messageEl.className = 'message result';
    messageEl.textContent = `${resultMsg}  •  Net: ${netSymbol}$${netChange}`;
  } else if (netChange > 0) {
    messageEl.className = 'message win';
    messageEl.textContent = `${resultMsg}  •  +$${netChange}`;
  } else if (netChange < 0) {
    messageEl.className = 'message lose';
    messageEl.textContent = `${resultMsg}  •  -$${Math.abs(netChange)}`;
  } else {
    messageEl.className = 'message info';
    messageEl.textContent = resultMsg;
  }
  
  // Check bankroll
  if (state.bankroll <= 0) {
    messageEl.textContent += ' — Bankroll empty! Reset in settings.';
  }
  
  renderAll();
}

// ── Bet Resolution Helpers ──

function resolveField(total) {
  const bet = state.bets.field;
  if (total === 2) {
    state.bankroll += bet * 3; // 2:1 = bet + 2*bet
    return { net: bet * 2, msg: `Field: 2 pays 2:1! +$${bet * 2}` };
  }
  if (total === 12) {
    const mult = state.field12Pays === 3 ? 4 : 3; // 3:1 = bet+3*bet, 2:1 = bet+2*bet
    const win = bet * (mult - 1);
    state.bankroll += bet * mult;
    return { net: win, msg: `Field: 12 pays ${state.field12Pays}:1! +$${win}` };
  }
  if (total === 3 || total === 4 || total === 9 || total === 10 || total === 11) {
    state.bankroll += bet * 2;
    return { net: bet, msg: `Field wins! +$${bet}` };
  }
  // 5,6,7,8 lose
  return { net: -bet, msg: `Field loses. -$${bet}` };
}

function resolveHardways(total, hard, hardNum, results, netChange) {
  for (const [key, amount] of Object.entries(state.bets)) {
    if (!key.startsWith('hard_')) continue;
    const hNum = parseInt(key.split('_')[1]);
    
    if (total === 7) {
      // Lose on 7
      netChange -= amount;
      results.push(`Hard ${hNum} loses on 7. -$${amount}`);
      delete state.bets[key];
    } else if (hard && hardNum === hNum) {
      // Win! Hardway hit
      const [payNum, payDen] = HARDWAY_PAYOUTS[hNum];
      const win = Math.floor(amount * payNum / payDen);
      state.bankroll += amount + win;
      netChange += win;
      results.push(`Hard ${hNum} hits! +$${win}`);
      delete state.bets[key];
    } else if (total === hNum && !hard) {
      // Easy way — lose
      netChange -= amount;
      results.push(`Hard ${hNum} loses (easy ${hNum}). -$${amount}`);
      delete state.bets[key];
    }
    // Otherwise stays up
  }
  return netChange;
}

function resolveProps(total, d1, d2, results, netChange) {
  // Any 7
  if (state.bets.any7) {
    if (total === 7) {
      const [payNum, payDen] = PROP_PAYOUTS.any7;
      const win = Math.floor(state.bets.any7 * payNum / payDen);
      state.bankroll += state.bets.any7 + win;
      netChange += win;
      results.push(`Any 7 wins! +$${win}`);
    } else {
      netChange -= state.bets.any7;
      results.push(`Any 7 loses. -$${state.bets.any7}`);
    }
    delete state.bets.any7;
  }
  
  // Any Craps (2,3,12)
  if (state.bets.anycraps) {
    if (total === 2 || total === 3 || total === 12) {
      const [payNum, payDen] = PROP_PAYOUTS.anyCraps;
      const win = Math.floor(state.bets.anycraps * payNum / payDen);
      state.bankroll += state.bets.anycraps + win;
      netChange += win;
      results.push(`Any Craps wins! +$${win}`);
    } else {
      netChange -= state.bets.anycraps;
      results.push(`Any Craps loses. -$${state.bets.anycraps}`);
    }
    delete state.bets.anycraps;
  }
  
  // Individual prop bets (2, 3, 11, 12) — we use the horn-style keys
  // We'll support 'prop_2', 'prop_3', 'prop_11', 'prop_12'
  const propMap = { 2: 'two', 3: 'three', 11: 'eleven', 12: 'twelve' };
  for (const [key, amount] of Object.entries(state.bets)) {
    if (!key.startsWith('prop_')) continue;
    const propNum = parseInt(key.split('_')[1]);
    if (total === propNum) {
      const payoutKey = propMap[propNum];
      const [payNum, payDen] = PROP_PAYOUTS[payoutKey];
      const win = Math.floor(amount * payNum / payDen);
      state.bankroll += amount + win;
      netChange += win;
      results.push(`${propNum} hits! +$${win}`);
    } else {
      netChange -= amount;
      results.push(`Bet on ${propNum} loses. -$${amount}`);
    }
    delete state.bets[key];
  }
  
  return netChange;
}

function resolveComeOnRoll(total, results, netChange) {
  const amount = state.bets.come;
  if (total === 7 || total === 11) {
    // Come wins on first roll
    state.bankroll += amount * 2;
    netChange += amount;
    results.push(`Come wins! +$${amount}`);
    delete state.bets.come;
  } else if (total === 2 || total === 3 || total === 12) {
    // Come loses
    netChange -= amount;
    results.push(`Come loses (craps). -$${amount}`);
    delete state.bets.come;
  } else {
    // Come point established
    const comeKey = 'come_' + total;
    state.comePoints[comeKey] = amount;
    results.push(`Come: point ${total} established`);
    delete state.bets.come;
  }
  return netChange;
}

function resolveDontComeOnRoll(total, results, netChange) {
  const amount = state.bets.dontcome;
  if (total === 2 || total === 3) {
    state.bankroll += amount * 2;
    netChange += amount;
    results.push(`Don't Come wins! +$${amount}`);
    delete state.bets.dontcome;
  } else if (total === 7 || total === 11) {
    netChange -= amount;
    results.push(`Don't Come loses. -$${amount}`);
    delete state.bets.dontcome;
  } else if (total === 12) {
    state.bankroll += amount;
    results.push(`Don't Come pushes on 12.`);
    delete state.bets.dontcome;
  } else {
    // DC point established — we track it simply
    const dcKey = 'dc_' + total;
    state.comePoints[dcKey] = amount;
    results.push(`Don't Come: point ${total} established`);
    delete state.bets.dontcome;
  }
  return netChange;
}

// ── Payout Calculations ──
function calcOddsWin(point, bet) {
  const [payNum, payDen] = ODDS_PAYOUTS[point];
  return Math.floor(bet * payNum / payDen);
}

function calcDontOddsWin(point, bet) {
  const [payNum, payDen] = DONT_ODDS_PAYOUTS[point];
  return Math.floor(bet * payNum / payDen);
}

function calcPlaceWin(point, bet) {
  const [payNum, payDen] = PLACE_PAYOUTS[point];
  return Math.floor(bet * payNum / payDen);
}

// ── New Round ──
function newRound() {
  clearFeedbackBanner();
  state.phase = 'comeout';
  state.point = null;
  state.roundNum++;
  state.lastDecision = null;
  
  // Clear any remaining bets (they should be resolved already)
  state.bets = {};
  state.oddsBets = {};
  state.comePoints = {};
  
  messageEl.className = 'message info';
  messageEl.textContent = 'New come-out roll — place your bets!';
  strategyHintEl.textContent = '';
  
  if (state.bankroll <= 0) {
    state.bankroll = parseInt($('start-bankroll').value) || 1000;
    messageEl.textContent = 'Bankroll refilled! Place your bets.';
  }
  
  renderAll();
}

// ── Render All ──
function renderAll() {
  renderDice();
  renderPoint();
  buildBetGrid();
  renderActiveBets();
  renderActions();
  renderChips();
  renderBankroll();
  updateStats();
  
  // Show strategy hint if applicable
  if (state.showHint === 'always') {
    showCheatHint();
  } else if (state.lastDecision && state.showHint === 'after') {
    strategyHintEl.textContent = `💡 ${state.lastDecision.reason}`;
  }
}

// ── Settings Panel ──
$('settings-toggle').addEventListener('click', () => {
  $('settings-panel').classList.add('open');
  $('overlay').classList.add('show');
});

$('close-settings').addEventListener('click', closeSettings);
$('overlay').addEventListener('click', closeSettings);

function closeSettings() {
  $('settings-panel').classList.remove('open');
  $('overlay').classList.remove('show');
  applySettings();
}

function applySettings() {
  const newBankroll = parseInt($('start-bankroll').value) || 1000;
  const newOddsMult = $('odds-mult').value;
  const newField12 = parseInt($('field-12-pays').value);
  const newShowHint = $('show-hint').value;
  
  state.oddsMult = newOddsMult;
  state.field12Pays = newField12;
  state.showHint = newShowHint;
  
  if (state.phase === 'comeout' && Object.keys(state.bets).length === 0 && Object.keys(state.comePoints).length === 0) {
    state.bankroll = newBankroll;
  }
  
  saveSettings();
  renderAll();
}

$('reset-game').addEventListener('click', () => {
  state.bankroll = parseInt($('start-bankroll').value) || 1000;
  state.stats = { correct: 0, wrong: 0, total: 0 };
  state.roundNum = 0;
  state.bets = {};
  state.oddsBets = {};
  state.comePoints = {};
  state.point = null;
  state.phase = 'comeout';
  state.lastDecision = null;
  closeSettings();
  renderAll();
  messageEl.className = 'message info';
  messageEl.textContent = 'New game! Place your bets.';
});

// ── Add to Home Screen ──
function dismissATH() {
  $('add-to-home-banner').style.display = 'none';
  localStorage.setItem('craps_ath_dismissed', '1');
}

// ── Init ──
function init() {
  resolveDOM();
  loadSettings();
  renderAll();
  
  // Show ATH banner for iOS Safari
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|OPiOS|mercury/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  const dismissed = localStorage.getItem('craps_ath_dismissed');
  
  if (isIOS && isSafari && !isStandalone && !dismissed) {
    setTimeout(() => {
      $('add-to-home-banner').style.display = 'block';
    }, 2000);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
