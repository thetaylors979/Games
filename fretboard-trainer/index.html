<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fretboard Trainer v13</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8; --surface:#fff; --text:#2c2416; --text-secondary:#6b5e4a;
  --border:#d4c8b0; --accent:#c0392b; --accent-hover:#a93226;
  --green:#27ae60; --green-light:#d5f5e3; --red:#e74c3c; --red-light:#fadbd8;
  --orange:#e67e22; --orange-light:#fdebd0; --yellow-zone:#f1c40f; --yellow-light:#fef9e7;
  --blue-strip:#2980b9; --blue-light:#d6eaf8;
  --string-color:#8b7355; --fret-color:#b8a890; --circle-stroke:#c4b896;
  --shadow:0 2px 8px rgba(0,0,0,0.08); --shadow-lg:0 4px 16px rgba(0,0,0,0.12);
  --radius:12px; --radius-sm:8px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --transition:0.2s ease;
}
[data-theme="dark"]{
  --bg:#1a1a2e; --surface:#16213e; --text:#e0d6c2; --text-secondary:#a09080;
  --border:#2a2a4a; --accent:#e74c3c; --accent-hover:#c0392b;
  --green:#2ecc71; --green-light:#1a3a2a; --red:#e74c3c; --red-light:#3a1a1a;
  --orange:#f39c12; --orange-light:#3a2a1a; --yellow-zone:#f1c40f; --yellow-light:#3a3a1a;
  --blue-strip:#3498db; --blue-light:#1a2a3a;
  --string-color:#a09080; --fret-color:#4a4a6a; --circle-stroke:#3a3a5a;
  --shadow:0 2px 8px rgba(0,0,0,0.3); --shadow-lg:0 4px 16px rgba(0,0,0,0.4);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font); background:var(--bg); color:var(--text);
  display:flex; flex-direction:column; height:100dvh;
  -webkit-tap-highlight-color:transparent; user-select:none;
}

/* ===== HEADER ===== */
header{
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:8px 16px; display:flex; align-items:center; justify-content:space-between;
  gap:12px; flex-shrink:0; box-shadow:var(--shadow);
}
header h1{font-size:1.1rem;font-weight:700;white-space:nowrap}
header h1 .pick{color:var(--accent)}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:6px 10px; cursor:pointer; font-size:1.1rem; color:var(--text);
  transition:var(--transition); display:flex;align-items:center;gap:4px;
}
.icon-btn:hover{background:var(--bg)}
.icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== MODE TABS ===== */
nav{
  display:flex; gap:4px; padding:8px 12px; overflow-x:auto; flex-shrink:0;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
.mode-tab{
  padding:8px 14px; border-radius:20px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-secondary); cursor:pointer;
  font-size:0.8rem; font-weight:600; white-space:nowrap; transition:var(--transition);
}
.mode-tab:hover{background:var(--bg);color:var(--text)}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== MAIN CONTENT ===== */
main{
  flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column;
  align-items:center; gap:12px; -webkit-overflow-scrolling:touch;
}

/* ===== FRETBOARD CONTAINER ===== */
.fretboard-wrap{
  width:100%; max-width:800px; background:var(--surface); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); padding:16px 12px 12px; position:relative;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.fretboard-wrap.flipped{direction:rtl}
.fretboard-wrap.flipped .fretboard-content{direction:ltr}
.fretboard-wrap.flipped .string-labels{order:2}
.fretboard-wrap.flipped .fret-numbers{direction:ltr}

/* ===== SVG FRETBOARD ===== */
.fretboard-svg{width:100%;display:block}
.fretboard-svg circle.note-circle{cursor:pointer;transition:fill 0.15s,stroke 0.15s}
.fretboard-svg circle.note-circle:hover{filter:brightness(0.9)}
.fretboard-svg circle.note-circle.filled-correct{fill:var(--green);stroke:var(--green)}
.fretboard-svg circle.note-circle.filled-wrong{fill:var(--red);stroke:var(--red)}
.fretboard-svg circle.note-circle.filled-selected{fill:var(--accent);stroke:var(--accent);opacity:0.5}
.fretboard-svg circle.note-circle.filled-missed{fill:var(--blue-strip);stroke:var(--blue-strip);opacity:0.6}
.fretboard-svg circle.note-circle.filled-user{fill:var(--accent);stroke:var(--accent)}
.fretboard-svg circle.note-circle.highlight-target{fill:var(--blue-strip);stroke:var(--blue-strip);animation:pulse 1s infinite}
.fretboard-svg circle.note-circle.show-answer{fill:var(--green);stroke:var(--green);opacity:0.7}
.fretboard-svg circle.note-circle.reverse-correct{fill:var(--green);stroke:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ===== ZONE BANDS ===== */
.zone-red{fill:#e74c3c15;stroke:none}
.zone-orange{fill:#e67e2215;stroke:none}
.zone-yellow{fill:#f1c40f15;stroke:none}
[data-theme="dark"] .zone-red{fill:#e74c3c20}
[data-theme="dark"] .zone-orange{fill:#e67e2220}
[data-theme="dark"] .zone-yellow{fill:#f1c40f20}

/* ===== CONTROL PANEL ===== */
.control-panel{
  width:100%; max-width:800px; background:var(--surface); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:16px; display:flex; flex-direction:column; gap:12px;
}

/* ===== FLASHCARD DISPLAY ===== */
.flashcard-display{
  display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap;
}
.flashcard{
  width:80px; height:100px; background:var(--accent); color:#fff;
  border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center;
  font-size:2rem; font-weight:800; box-shadow:var(--shadow-lg);
  transition:transform 0.3s; cursor:pointer;
}
.flashcard:active{transform:scale(0.95)}
.flashcard-controls{display:flex;gap:8px;align-items:center}

/* ===== BUTTONS ===== */
.btn{
  padding:10px 20px; border-radius:var(--radius-sm); border:none; cursor:pointer;
  font-size:0.9rem; font-weight:600; transition:var(--transition);
  font-family:var(--font); display:flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#219a52}
.btn-sm{padding:6px 12px;font-size:0.8rem}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* ===== STATS BAR ===== */
.stats-bar{
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
}
.stat{
  background:var(--bg); border-radius:var(--radius-sm); padding:8px 14px;
  text-align:center; min-width:60px;
}
.stat-value{font-size:1.2rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:0.7rem;color:var(--text-secondary);text-transform:uppercase}

/* ===== TIMER ===== */
.timer-display{font-size:2.5rem;font-weight:800;text-align:center;font-variant-numeric:tabular-nums}
.timer-display.warning{color:var(--orange);animation:pulse 0.5s infinite}
.timer-display.danger{color:var(--red);animation:pulse 0.3s infinite}

/* ===== NOTE SELECTOR (REVERSE MODE) ===== */
.note-selector{
  display:flex; flex-wrap:wrap; gap:6px; justify-content:center;
}
.note-btn{
  width:44px; height:44px; border-radius:50%; border:2px solid var(--border);
  background:var(--surface); color:var(--text); cursor:pointer;
  font-size:0.75rem; font-weight:700; transition:var(--transition);
  display:flex; align-items:center; justify-content:center;
}
.note-btn:hover{background:var(--bg);border-color:var(--accent)}
.note-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.note-btn.correct{background:var(--green);color:#fff;border-color:var(--green)}
.note-btn.wrong{background:var(--red);color:#fff;border-color:var(--red)}

/* ===== ZONE SELECTOR ===== */
.zone-selector{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.zone-btn{
  padding:8px 16px; border-radius:20px; border:2px solid var(--border);
  background:var(--surface); cursor:pointer; font-weight:600; font-size:0.85rem;
  transition:var(--transition);
}
.zone-btn.red{border-color:#e74c3c;color:#e74c3c}
.zone-btn.red.active{background:#e74c3c;color:#fff}
.zone-btn.orange{border-color:#e67e22;color:#e67e22}
.zone-btn.orange.active{background:#e67e22;color:#fff}
.zone-btn.yellow{border-color:#f1c40f;color:#c8960c}
.zone-btn.yellow.active{background:#f1c40f;color:#fff}
.zone-btn.all{border-color:var(--accent);color:var(--accent)}
.zone-btn.all.active{background:var(--accent);color:#fff}

/* ===== PROGRESS DASHBOARD ===== */
.progress-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(48px,1fr));
  gap:4px; max-width:400px; margin:0 auto;
}
.progress-note{
  aspect-ratio:1; border-radius:var(--radius-sm); display:flex;
  align-items:center; justify-content:center; font-weight:700; font-size:0.75rem;
  color:#fff; cursor:pointer; transition:var(--transition);
}
.progress-note:hover{filter:brightness(1.1)}

/* ===== SETTINGS PANEL ===== */
.settings-row{
  display:flex; gap:12px; align-items:center; flex-wrap:wrap;
}
.settings-row label{font-weight:600;font-size:0.85rem;color:var(--text-secondary)}
select{
  padding:6px 12px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-family:var(--font);
  font-size:0.85rem; cursor:pointer;
}

/* ===== TOAST ===== */
.toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:var(--text); color:var(--bg); padding:10px 24px;
  border-radius:20px; font-weight:600; font-size:0.9rem;
  z-index:1000; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
.toast.show{opacity:1}

/* ===== CHART OVERLAY ===== */
.chart-overlay{
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.85); z-index:2000;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.chart-overlay img{
  max-width:95%; max-height:95%; object-fit:contain;
  border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,0.5);
}
.chart-overlay .close-hint{
  position:absolute; top:16px; right:20px; color:#fff;
  font-size:0.85rem; opacity:0.7; pointer-events:none;
}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  header h1{font-size:0.95rem}
  .mode-tab{padding:6px 10px;font-size:0.7rem}
  .fretboard-wrap{padding:8px 6px 6px}
  .flashcard{width:64px;height:80px;font-size:1.5rem}
  .note-btn{width:36px;height:36px;font-size:0.65rem}
  .stat{padding:6px 10px}
  .stat-value{font-size:1rem}
}
</style>
</head>
<body>

<header>
  <h1>🎸 <span class="pick">Fretboard</span> Trainer <span style="font-size:0.6rem;opacity:0.6;font-weight:400">v13</span></h1>
  <div class="header-actions">
    <a href="http://100.124.6.90:8080/" class="icon-btn" title="Return to Launcher" style="text-decoration:none">🏠</a>
    <button class="icon-btn" id="btnStats" title="Progress">📊</button>
    <button class="icon-btn" id="btnSettings" title="Settings">⚙️</button>
    <button class="icon-btn" id="btnDarkMode" title="Dark Mode">🌙</button>
  </div>
</header>

<nav id="modeTabs">
  <button class="mode-tab active" data-mode="flashcard">🎯 Flashcard</button>
  <button class="mode-tab" data-mode="reverse">🔍 Reverse</button>
  <button class="mode-tab" data-mode="freedraw">✏️ Free Draw</button>
  <button class="mode-tab" data-mode="speed">⏱️ Speed Round</button>
  <button class="mode-tab" data-mode="zone">🗺️ Zone Training</button>
</nav>

<main id="mainContent">
  <!-- Fretboard -->
  <div class="fretboard-wrap" id="fretboardWrap">
    <svg class="fretboard-svg" id="fretboardSvg" viewBox="0 0 800 360"></svg>
  </div>

  <!-- Control Panel -->
  <div class="control-panel" id="controlPanel"></div>

  <!-- Chart Overlay -->
  <div class="chart-overlay" id="chartOverlay" style="display:none" onclick="hideChart()">
    <span class="close-hint">Tap anywhere to close</span>
    <img src="chord-chart.jpg" alt="Guitar Chord & String Reference Chart">
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// FRETBOARD TRAINER - Full Application
// ============================================================

// ===== CONSTANTS =====
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NATURAL_NOTES = ['C','D','E','F','G','A','B'];
const STRING_COUNT = 6;
const FRET_COUNT = 12;
const ZONES = { red:[1,4], orange:[5,8], yellow:[9,12] };

// Standard tuning: E2 A2 D3 G3 B3 E4 (open string notes)
const STANDARD_TUNING = ['E','A','D','G','B','E'];
const TUNINGS = {
  'Standard (EADGBE)': ['E','A','D','G','B','E'],
  'Drop D (DADGBE)':   ['D','A','D','G','B','E'],
  'Open G (DGDGBD)':   ['D','G','D','G','B','D'],
  'Open D (DADF#AD)':  ['D','A','D','F#','A','D'],
  'Half Step Down':     ['D#','G#','C#','F#','A#','D#'],
};

// ===== STATE =====
let state = {
  mode: 'flashcard',
  tuning: 'Standard (EADGBE)',
  openStrings: [...STANDARD_TUNING],
  leftHanded: false,
  darkMode: false,
  currentNote: null,
  userMarks: {},        // { 'string-fret': true }
  correctMarks: {},     // { 'string-fret': true }
  missedMarks: {},      // { 'string-fret': true } — correct positions user didn't tap
  score: 0,
  streak: 0,
  bestStreak: 0,
  totalAttempts: 0,
  correctAttempts: 0,
  timerSeconds: 60,
  timerRunning: false,
  timerInterval: null,
  timeLeft: 60,
  zoneFilter: 'all',    // 'red','orange','yellow','all'
  reverseTarget: null,  // { string, fret }
  reverseAnswered: false,
  audioEnabled: true,
  showSettings: false,
  showStats: false,
  showAnswers: false,
  // Per-note tracking
  noteStats: {},        // { 'C': { correct, total }, ... }
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('fretboard-trainer-state');
    if (saved) {
      const s = JSON.parse(saved);
      state.darkMode = s.darkMode || false;
      state.leftHanded = s.leftHanded || false;
      state.tuning = s.tuning || 'Standard (EADGBE)';
      state.audioEnabled = s.audioEnabled !== false;
      state.noteStats = s.noteStats || {};
      state.bestStreak = s.bestStreak || 0;
    }
  } catch(e) {}
  applyTuning();
}
function saveState() {
  try {
    localStorage.setItem('fretboard-trainer-state', JSON.stringify({
      darkMode: state.darkMode,
      leftHanded: state.leftHanded,
      tuning: state.tuning,
      audioEnabled: state.audioEnabled,
      noteStats: state.noteStats,
      bestStreak: state.bestStreak,
    }));
  } catch(e) {}
}

// ===== AUDIO ENGINE =====
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playNote(noteName, octave=3) {
  if (!state.audioEnabled) return;
  try {
    initAudio();
    const noteIndex = NOTES.indexOf(noteName);
    if (noteIndex === -1) return;
    // A4 = 440Hz, A is index 9 in NOTES array
    const semitonesFromA4 = (noteIndex - 9) + (octave - 4) * 12;
    const freq = 440 * Math.pow(2, semitonesFromA4 / 12);

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // Karplus-Strong-ish pluck using filtered noise burst
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now);

    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 1.5);
  } catch(e) {}
}

// ===== FRETBOARD MATH =====
function getNoteAt(stringIndex, fret) {
  const openNote = state.openStrings[stringIndex];
  const openIndex = NOTES.indexOf(openNote);
  if (openIndex === -1) return null;
  const noteIndex = (openIndex + fret) % 12;
  return NOTES[noteIndex];
}

function getOctave(stringIndex, fret) {
  // Rough octave mapping: low E string (index 0) starts at E2
  const baseOctaves = [2, 2, 3, 3, 3, 4]; // E2 A2 D3 G3 B3 E4
  const openNote = state.openStrings[stringIndex];
  const openIndex = NOTES.indexOf(openNote);
  if (openIndex === -1) return 3;
  const noteIndex = (openIndex + fret) % 12;
  const octaveShift = Math.floor((openIndex + fret) / 12);
  return baseOctaves[stringIndex] + octaveShift;
}

function findAllPositions(noteName) {
  const positions = [];
  for (let s = 0; s < STRING_COUNT; s++) {
    for (let f = 1; f <= FRET_COUNT; f++) {
      if (getNoteAt(s, f) === noteName) {
        // Apply zone filter
        if (state.zoneFilter !== 'all') {
          const [zMin, zMax] = ZONES[state.zoneFilter];
          if (f < zMin || f > zMax) continue;
        }
        positions.push({ string: s, fret: f });
      }
    }
  }
  return positions;
}

function getRandomNote(includeSharps=true) {
  const pool = includeSharps ? NOTES : NATURAL_NOTES;
  return pool[Math.floor(Math.random() * pool.length)];
}

function getRandomPosition() {
  const s = Math.floor(Math.random() * STRING_COUNT);
  const f = Math.floor(Math.random() * FRET_COUNT) + 1;
  return { string: s, fret: f };
}

// ===== SVG RENDERING =====
const SVG_NS = 'http://www.w3.org/2000/svg';
const BOARD = { x: 50, y: 20, w: 700, h: 270, topMargin: 16 };

function renderFretboard() {
  const svg = document.getElementById('fretboardSvg');
  svg.innerHTML = '';

  const B = BOARD;
  const stringSpacing = B.h / (STRING_COUNT - 1);
  const fretSpacing = B.w / FRET_COUNT;

  // Zone bands
  const zones = [
    { name:'red', start:1, end:4, color:'#e74c3c15' },
    { name:'orange', start:5, end:8, color:'#e67e2215' },
    { name:'yellow', start:9, end:12, color:'#f1c40f15' },
  ];
  if (state.darkMode) {
    zones[0].color = '#e74c3c20';
    zones[1].color = '#e67e2220';
    zones[2].color = '#f1c40f20';
  }
  zones.forEach(z => {
    const x1 = B.x + (z.start - 1) * fretSpacing;
    const x2 = B.x + z.end * fretSpacing;
    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', x1);
    rect.setAttribute('y', B.y + B.topMargin);
    rect.setAttribute('width', x2 - x1);
    rect.setAttribute('height', B.h);
    rect.setAttribute('fill', z.color);
    rect.setAttribute('rx', '4');
    svg.appendChild(rect);
  });

  // Strings
  for (let s = 0; s < STRING_COUNT; s++) {
    const y = B.y + B.topMargin + s * stringSpacing;
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', B.x);
    line.setAttribute('y1', y);
    line.setAttribute('x2', B.x + B.w);
    line.setAttribute('y2', y);
    line.setAttribute('stroke', state.darkMode ? '#5a5a7a' : '#8b7355');
    line.setAttribute('stroke-width', s < 2 ? 2.5 : s < 4 ? 2 : 1.5);
    svg.appendChild(line);
  }

  // Frets
  for (let f = 0; f <= FRET_COUNT; f++) {
    const x = B.x + f * fretSpacing;
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', x);
    line.setAttribute('y1', B.y + B.topMargin);
    line.setAttribute('x2', x);
    line.setAttribute('y2', B.y + B.topMargin + B.h);
    line.setAttribute('stroke', state.darkMode ? '#4a4a6a' : '#b8a890');
    line.setAttribute('stroke-width', f === 0 ? 3 : 1);
    svg.appendChild(line);
  }

  // Fret markers (dots at 3,5,7,9,12)
  [3,5,7,9,12].forEach(f => {
    const x = B.x + (f - 0.5) * fretSpacing;
    const y = B.y + B.topMargin + B.h / 2;
    const dot = document.createElementNS(SVG_NS, 'circle');
    dot.setAttribute('cx', x);
    dot.setAttribute('cy', y);
    dot.setAttribute('r', f === 12 ? 5 : 4);
    dot.setAttribute('fill', state.darkMode ? '#5a5a7a' : '#c4b896');
    svg.appendChild(dot);
    // Double dot at 12th fret
    if (f === 12) {
      const dot2 = document.createElementNS(SVG_NS, 'circle');
      dot2.setAttribute('cx', x);
      dot2.setAttribute('cy', y - stringSpacing * 1.5);
      dot2.setAttribute('r', 4);
      dot2.setAttribute('fill', state.darkMode ? '#5a5a7a' : '#c4b896');
      svg.appendChild(dot2);
      const dot3 = document.createElementNS(SVG_NS, 'circle');
      dot3.setAttribute('cx', x);
      dot3.setAttribute('cy', y + stringSpacing * 1.5);
      dot3.setAttribute('r', 4);
      dot3.setAttribute('fill', state.darkMode ? '#5a5a7a' : '#c4b896');
      svg.appendChild(dot3);
    }
  });

  // Note circles
  for (let s = 0; s < STRING_COUNT; s++) {
    for (let f = 1; f <= FRET_COUNT; f++) {
      const x = B.x + (f - 0.5) * fretSpacing;
      const y = B.y + B.topMargin + s * stringSpacing;
      const key = `${s}-${f}`;
      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', 20);
      circle.setAttribute('fill', state.darkMode ? '#1a1a3e' : '#fff');
      circle.setAttribute('stroke', state.darkMode ? '#3a3a5a' : '#c4b896');
      circle.setAttribute('stroke-width', '1.5');
      circle.classList.add('note-circle');
      circle.dataset.key = key;
      circle.dataset.string = s;
      circle.dataset.fret = f;

      // Apply visual state
      if (state.userMarks[key]) {
        if (state.correctMarks[key]) {
          circle.classList.add('filled-correct');
        } else if (state.missedMarks[key]) {
          // This shouldn't happen (userMarks + missedMarks), but just in case
          circle.classList.add('filled-wrong');
        } else if (state.mode === 'freedraw') {
          circle.classList.add('filled-user');
        } else if (state.mode === 'flashcard' || state.mode === 'zone') {
          // In flashcard/zone mode, show selected state before check
          circle.classList.add('filled-selected');
        } else {
          circle.classList.add('filled-wrong');
        }
      }
      if (state.correctMarks[key] && state.showAnswers) {
        circle.classList.add('show-answer');
      }
      if (state.missedMarks[key]) {
        circle.classList.add('filled-missed');
      }
      if (state.correctMarks[key] && state.mode !== 'flashcard' && state.mode !== 'freedraw') {
        // Show correct answers in reverse mode after answering
      }
      if (state.correctMarks[key] && state.reverseAnswered) {
        circle.classList.add('reverse-correct');
      }
      if (state.reverseTarget && state.reverseTarget.string === s && state.reverseTarget.fret === f) {
        circle.classList.add('highlight-target');
      }

      circle.addEventListener('click', () => onCircleClick(s, f, key));
      circle.addEventListener('touchend', (e) => {
        e.preventDefault();
        onCircleClick(s, f, key);
      });

      svg.appendChild(circle);

      // Show note label in free draw mode for marked circles
      if (state.mode === 'freedraw' && state.userMarks[key]) {
        const note = getNoteAt(s, f);
        const text = document.createElementNS(SVG_NS, 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', y + 5);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#fff');
        text.setAttribute('stroke', '#000');
        text.setAttribute('stroke-width', '2');
        text.setAttribute('paint-order', 'stroke fill');
        text.setAttribute('font-size', '11');
        text.setAttribute('font-weight', '800');
        text.setAttribute('font-family', 'system-ui,sans-serif');
        text.setAttribute('pointer-events', 'none');
        text.textContent = note;
        svg.appendChild(text);
      }
    }
  }

  // String labels
  const labelOrder = state.leftHanded ? [...state.openStrings].reverse() : [...state.openStrings];
  for (let s = 0; s < STRING_COUNT; s++) {
    const y = B.y + B.topMargin + s * stringSpacing;
    const text = document.createElementNS(SVG_NS, 'text');
    text.setAttribute('x', B.x - 12);
    text.setAttribute('y', y + 5);
    text.setAttribute('text-anchor', 'end');
    text.setAttribute('fill', state.darkMode ? '#a09080' : '#6b5e4a');
    text.setAttribute('font-size', '13');
    text.setAttribute('font-weight', '700');
    text.setAttribute('font-family', 'system-ui,sans-serif');
    const displayIdx = state.leftHanded ? STRING_COUNT - 1 - s : s;
    text.textContent = state.openStrings[displayIdx];
    svg.appendChild(text);
  }

  // Fret numbers
  for (let f = 1; f <= FRET_COUNT; f++) {
    const x = B.x + (f - 0.5) * fretSpacing;
    const text = document.createElementNS(SVG_NS, 'text');
    text.setAttribute('x', x);
    text.setAttribute('y', B.y + B.topMargin + B.h + 22);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', state.darkMode ? '#a09080' : '#6b5e4a');
    text.setAttribute('font-size', '11');
    text.setAttribute('font-weight', '600');
    text.setAttribute('font-family', 'system-ui,sans-serif');
    text.textContent = f;
    svg.appendChild(text);
  }

  // Blue bottom strip
  const strip = document.createElementNS(SVG_NS, 'rect');
  strip.setAttribute('x', B.x - 5);
  strip.setAttribute('y', B.y + B.topMargin + B.h + 8);
  strip.setAttribute('width', B.w + 10);
  strip.setAttribute('height', 24);
  strip.setAttribute('fill', state.darkMode ? '#1a2a3a' : '#d6eaf8');
  strip.setAttribute('rx', '4');
  strip.setAttribute('opacity', '0.6');
  svg.insertBefore(strip, svg.firstChild);
}

// ===== INTERACTION =====
function onCircleClick(stringIdx, fret, key) {
  const note = getNoteAt(stringIdx, fret);
  if (!note) return;

  playNote(note, getOctave(stringIdx, fret));

  switch (state.mode) {
    case 'flashcard':
      handleFlashcardClick(key, note);
      break;
    case 'reverse':
      handleReverseClick(stringIdx, fret, note);
      break;
    case 'freedraw':
      handleFreeDrawClick(key);
      break;
    case 'speed':
      handleSpeedClick(key, note);
      break;
    case 'zone':
      handleFlashcardClick(key, note);
      break;
  }
}

// ===== FLASHCARD MODE =====
function handleFlashcardClick(key, note) {
  if (!state.currentNote) return;
  if (state.userMarks[key]) {
    // Un-toggle
    delete state.userMarks[key];
  } else {
    state.userMarks[key] = true;
  }
  renderFretboard();
}

function newFlashcard() {
  state.currentNote = getRandomNote();
  state.userMarks = {};
  state.correctMarks = {};
  state.missedMarks = {};
  state.showAnswers = false;
  renderFretboard();
  renderControlPanel();
}

function checkFlashcard() {
  if (!state.currentNote) return;
  const correctPositions = findAllPositions(state.currentNote);
  const correctKeys = new Set(correctPositions.map(p => `${p.string}-${p.fret}`));
  const userKeys = new Set(Object.keys(state.userMarks));

  let correct = 0, wrong = 0, missed = 0;

  // Check user marks
  for (const key of userKeys) {
    if (correctKeys.has(key)) {
      correct++;
      state.correctMarks[key] = true;
    } else {
      wrong++;
    }
  }

  // Check missed
  for (const key of correctKeys) {
    if (!userKeys.has(key)) {
      missed++;
      state.missedMarks[key] = true;
    }
  }

  state.totalAttempts++;
  // Track per-position accuracy: correct positions found vs total correct positions
  state.correctAttempts += correct;
  state.totalAttempts += wrong; // count wrong taps as additional attempts
  if (wrong === 0 && missed === 0) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    trackNoteStat(state.currentNote, true);
    showToast('✅ Perfect! All positions found!');
  } else {
    state.streak = 0;
    trackNoteStat(state.currentNote, false);
    showToast(`${correct} correct, ${wrong} wrong, ${missed} missed`);
  }

  renderFretboard();
  renderControlPanel();
  saveState();
}

// ===== REVERSE MODE =====
function handleReverseClick(stringIdx, fret, note) {
  if (state.reverseAnswered) return;
  if (!state.reverseTarget) return;
  if (stringIdx === state.reverseTarget.string && fret === state.reverseTarget.fret) {
    state.reverseAnswered = true;
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    state.totalAttempts++;
    state.correctAttempts++;
    trackNoteStat(note, true);
    showToast('✅ Correct!');
    renderFretboard();
    renderControlPanel();
    saveState();
  }
}

function newReverseQuestion() {
  state.reverseTarget = getRandomPosition();
  state.reverseAnswered = false;
  state.userMarks = {};
  state.correctMarks = {};
  renderFretboard();
  renderControlPanel();
}

function answerReverse(selectedNote) {
  if (state.reverseAnswered || !state.reverseTarget) return;
  const correctNote = getNoteAt(state.reverseTarget.string, state.reverseTarget.fret);
  state.reverseAnswered = true;
  state.totalAttempts++;

  if (selectedNote === correctNote) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    state.correctAttempts++;
    trackNoteStat(correctNote, true);
    showToast('✅ Correct!');
  } else {
    state.streak = 0;
    trackNoteStat(correctNote, false);
    showToast(`❌ That's ${correctNote}`);
  }
  // Show the correct position
  state.correctMarks[`${state.reverseTarget.string}-${state.reverseTarget.fret}`] = true;
  renderFretboard();
  renderControlPanel();
  saveState();
}

// ===== FREE DRAW MODE =====
function handleFreeDrawClick(key) {
  if (state.userMarks[key]) {
    delete state.userMarks[key];
  } else {
    state.userMarks[key] = true;
  }
  renderFretboard();
}

function checkFreeDraw() {
  // Show all note names on the entire fretboard
  for (let s = 0; s < STRING_COUNT; s++) {
    for (let f = 1; f <= FRET_COUNT; f++) {
      state.userMarks[`${s}-${f}`] = true;
    }
  }
  renderFretboard();
  showToast('All notes shown — tap to hide individual notes');
}

function clearFreeDraw() {
  state.userMarks = {};
  state.correctMarks = {};
  renderFretboard();
}

// ===== SPEED ROUND =====
function handleSpeedClick(key, note) {
  if (!state.timerRunning || !state.currentNote) return;
  if (state.userMarks[key]) {
    // Un-toggle
    delete state.userMarks[key];
    if (note === state.currentNote) delete state.correctMarks[key];
    renderFretboard();
    renderControlPanel();
    return;
  }

  state.userMarks[key] = true;
  state.totalAttempts++;

  if (note === state.currentNote) {
    state.correctMarks[key] = true;
    state.correctAttempts++;
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    trackNoteStat(note, true);

    // Check if all positions found
    const correctPositions = findAllPositions(state.currentNote);
    const allFound = correctPositions.every(p => state.userMarks[`${p.string}-${p.fret}`]);
    if (allFound) {
      showToast(`🎯 All ${state.currentNote} positions found!`);
      setTimeout(() => newSpeedNote(), 800);
    }
  } else {
    state.streak = 0;
    trackNoteStat(state.currentNote, false);
  }
  renderFretboard();
  renderControlPanel();
}

function newSpeedNote() {
  state.currentNote = getRandomNote();
  state.userMarks = {};
  state.correctMarks = {};
  renderFretboard();
  renderControlPanel();
}

function startSpeedRound() {
  state.score = 0;
  state.streak = 0;
  state.totalAttempts = 0;
  state.correctAttempts = 0;
  state.timeLeft = state.timerSeconds;
  state.timerRunning = true;
  state.userMarks = {};
  state.correctMarks = {};
  state.currentNote = getRandomNote();
  renderFretboard();
  renderControlPanel();

  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      endSpeedRound();
    }
    renderControlPanel();
  }, 1000);
}

function endSpeedRound() {
  state.timerRunning = false;
  clearInterval(state.timerInterval);
  state.currentNote = null;
  state.userMarks = {};
  state.correctMarks = {};
  renderFretboard();
  renderControlPanel();
  saveState();
  showToast(`⏱️ Time! Score: ${state.score} | Accuracy: ${state.totalAttempts > 0 ? Math.round(state.correctAttempts/state.totalAttempts*100) : 0}%`);
}

// ===== ZONE TRAINING =====
function setZoneFilter(zone) {
  state.zoneFilter = zone;
  if (state.mode === 'zone' || state.mode === 'flashcard') {
    newFlashcard();
  }
  renderControlPanel();
}

// ===== STATS =====
function trackNoteStat(note, correct) {
  if (!state.noteStats[note]) {
    state.noteStats[note] = { correct: 0, total: 0 };
  }
  state.noteStats[note].total++;
  if (correct) state.noteStats[note].correct++;
}

function getNoteAccuracy(note) {
  const s = state.noteStats[note];
  if (!s || s.total === 0) return 0;
  return Math.round(s.correct / s.total * 100);
}

// ===== TUNING =====
function applyTuning() {
  state.openStrings = TUNINGS[state.tuning] || STANDARD_TUNING;
}

// ===== UI RENDERING =====
function renderControlPanel() {
  const panel = document.getElementById('controlPanel');
  let html = '';

  // Stats bar (always visible)
  html += `<div class="stats-bar">
    <div class="stat"><div class="stat-value">${state.streak}</div><div class="stat-label">Streak</div></div>
    <div class="stat"><div class="stat-value">${state.bestStreak}</div><div class="stat-label">Best</div></div>
    <div class="stat"><div class="stat-value">${state.totalAttempts > 0 ? Math.round(state.correctAttempts/state.totalAttempts*100) : 0}%</div><div class="stat-label">Accuracy</div></div>
    <button class="btn btn-secondary btn-sm" onclick="resetStats()" style="height:100%;align-self:stretch">🔄 Reset</button>
  </div>`;

  switch (state.mode) {
    case 'flashcard':
    case 'zone':
      html += renderFlashcardPanel();
      break;
    case 'reverse':
      html += renderReversePanel();
      break;
    case 'freedraw':
      html += renderFreeDrawPanel();
      break;
    case 'speed':
      html += renderSpeedPanel();
      break;
  }

  // Zone filter for flashcard/zone modes
  if (state.mode === 'flashcard' || state.mode === 'zone') {
    html += `<div class="zone-selector">
      <button class="zone-btn all ${state.zoneFilter==='all'?'active':''}" onclick="setZoneFilter('all')">All Frets</button>
      <button class="zone-btn red ${state.zoneFilter==='red'?'active':''}" onclick="setZoneFilter('red')">Red Zone (1-4)</button>
      <button class="zone-btn orange ${state.zoneFilter==='orange'?'active':''}" onclick="setZoneFilter('orange')">Orange (5-8)</button>
      <button class="zone-btn yellow ${state.zoneFilter==='yellow'?'active':''}" onclick="setZoneFilter('yellow')">Yellow (9-12)</button>
    </div>`;
  }

  panel.innerHTML = html;
}

function renderFlashcardPanel() {
  if (!state.currentNote) {
    return `<div style="text-align:center">
      <button class="btn btn-primary" onclick="newFlashcard()">🎯 Draw a Card</button>
      <button class="btn btn-secondary" onclick="showChart()" style="margin-top:8px">📊 Chart</button>
    </div>`;
  }
  return `<div class="flashcard-display">
    <div class="flashcard" onclick="playNote('${state.currentNote}',3)">${state.currentNote}</div>
    <div class="flashcard-controls">
      <button class="btn btn-primary" onclick="checkFlashcard()">✓ Check</button>
      <button class="btn btn-secondary" onclick="newFlashcard()">🔄 Next Card</button>
    </div>
    <div class="flashcard-controls" style="margin-top:6px">
      <button class="btn btn-secondary btn-sm" onclick="toggleShowAnswers()">${state.showAnswers ? '🙈 Hide' : '👁️ Show'} Answers</button>
      <button class="btn btn-secondary btn-sm" onclick="showChart()">📊 Chart</button>
    </div>
  </div>
  <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem">
    Tap all positions where <strong>${state.currentNote}</strong> appears on the fretboard
  </p>`;
}

function renderReversePanel() {
  const correctNote = state.reverseTarget ? getNoteAt(state.reverseTarget.string, state.reverseTarget.fret) : null;
  const btns = NOTES.map(n => {
    let cls = 'note-btn';
    if (state.reverseAnswered) {
      if (n === correctNote) cls += ' correct';
    }
    return `<button class="${cls}" onclick="answerReverse('${n}')" ${state.reverseAnswered?'disabled':''}>${n}</button>`;
  }).join('');

  return `<div style="text-align:center">
    <p style="margin-bottom:8px;color:var(--text-secondary);font-size:0.85rem">
      ${state.reverseTarget && !state.reverseAnswered ? 'Name the highlighted note:' : state.reverseAnswered ? `The note was <strong>${correctNote}</strong>` : 'Click "New Question" to start'}
    </p>
    <div class="note-selector">${btns}</div>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="newReverseQuestion()">🔄 New Question</button>
      <button class="btn btn-secondary btn-sm" onclick="showChart()">📊 Chart</button>
    </div>
  </div>`;
}

function renderFreeDrawPanel() {
  return `<div style="text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="checkFreeDraw()">✓ Show Notes</button>
    <button class="btn btn-secondary" onclick="clearFreeDraw()">🗑️ Clear All</button>
    <button class="btn btn-secondary btn-sm" onclick="showChart()">📊 Chart</button>
  </div>
  <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem">
    Tap circles to write notes, then check against the answer key
  </p>`;
}

function renderSpeedPanel() {
  const timerClass = state.timeLeft <= 10 ? 'danger' : state.timeLeft <= 20 ? 'warning' : '';
  if (state.timerRunning) {
    return `<div class="timer-display ${timerClass}">${state.timeLeft}s</div>
    <div class="flashcard-display">
      <div class="flashcard">${state.currentNote}</div>
    </div>
    <div style="text-align:center">
      <p style="color:var(--text-secondary);font-size:0.85rem">Score: <strong>${state.score}</strong></p>
      <button class="btn btn-secondary btn-sm" onclick="endSpeedRound()">⏹️ Stop Early</button>
    </div>`;
  }
  return `<div style="text-align:center">
    <p style="margin-bottom:8px;color:var(--text-secondary)">Find all positions of each note before time runs out!</p>
    <div style="display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap">
      <label>Time:</label>
      <select onchange="state.timerSeconds=parseInt(this.value)" style="width:auto">
        <option value="30">30s</option>
        <option value="60" selected>60s</option>
        <option value="90">90s</option>
        <option value="120">120s</option>
      </select>
      <button class="btn btn-primary" onclick="startSpeedRound()">▶️ Start</button>
      <button class="btn btn-secondary btn-sm" onclick="showChart()">📊 Chart</button>
    </div>
  </div>`;
}

// ===== SETTINGS PANEL =====
function renderSettings() {
  const panel = document.getElementById('controlPanel');
  panel.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">
    <h3 style="font-size:1rem">⚙️ Settings</h3>
    <div class="settings-row">
      <label>Tuning:</label>
      <select id="tuningSelect" onchange="changeTuning(this.value)">
        ${Object.keys(TUNINGS).map(t => `<option value="${t}" ${state.tuning===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="settings-row">
      <label>Left-Handed:</label>
      <button class="btn btn-secondary btn-sm ${state.leftHanded?'active':''}" onclick="toggleLeftHanded()">
        ${state.leftHanded ? '✅ On' : 'Off'}
      </button>
    </div>
    <div class="settings-row">
      <label>Audio:</label>
      <button class="btn btn-secondary btn-sm ${state.audioEnabled?'active':''}" onclick="toggleAudio()">
        ${state.audioEnabled ? '✅ On' : '🔇 Off'}
      </button>
    </div>
    <div class="settings-row">
      <label>Dark Mode:</label>
      <button class="btn btn-secondary btn-sm ${state.darkMode?'active':''}" onclick="toggleDarkMode()">
        ${state.darkMode ? '🌙 On' : '☀️ Off'}
      </button>
    </div>
    <button class="btn btn-secondary" onclick="state.showSettings=false;switchMode(state.mode)">← Back</button>
  </div>`;
}

// ===== STATS PANEL =====
function renderStats() {
  const panel = document.getElementById('controlPanel');
  const noteGrid = NOTES.map(n => {
    const acc = getNoteAccuracy(n);
    const hue = acc * 1.2; // 0 = red, 120 = green
    return `<div class="progress-note" style="background:hsl(${hue},60%,${30+acc*0.2}%)" title="${n}: ${acc}%">${n}<br><small>${acc}%</small></div>`;
  }).join('');

  panel.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">
    <h3 style="font-size:1rem">📊 Progress Dashboard</h3>
    <div class="stats-bar">
      <div class="stat"><div class="stat-value">${state.totalAttempts}</div><div class="stat-label">Attempts</div></div>
      <div class="stat"><div class="stat-value">${state.bestStreak}</div><div class="stat-label">Best Streak</div></div>
      <div class="stat"><div class="stat-value">${state.totalAttempts > 0 ? Math.round(state.correctAttempts/state.totalAttempts*100) : 0}%</div><div class="stat-label">Overall</div></div>
    </div>
    <h4 style="font-size:0.85rem;color:var(--text-secondary)">Per-Note Accuracy</h4>
    <div class="progress-grid">${noteGrid}</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="resetStats()">🗑️ Reset Stats</button>
      <button class="btn btn-secondary" onclick="state.showStats=false;switchMode(state.mode)">← Back</button>
    </div>
  </div>`;
}

// ===== CHART OVERLAY =====
function showChart() {
  document.getElementById('chartOverlay').style.display = 'flex';
}
function hideChart() {
  document.getElementById('chartOverlay').style.display = 'none';
}

function toggleShowAnswers() {
  if (!state.currentNote) return;
  state.showAnswers = !state.showAnswers;
  if (state.showAnswers) {
    const positions = findAllPositions(state.currentNote);
    state.correctMarks = {};
    positions.forEach(p => { state.correctMarks[`${p.string}-${p.fret}`] = true; });
  } else {
    state.correctMarks = {};
  }
  renderFretboard();
  renderControlPanel();
}

// ===== TOAST =====
let toastTimeout;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== MODE SWITCHING =====
function switchMode(mode) {
  state.mode = mode;
  state.userMarks = {};
  state.correctMarks = {};
  state.currentNote = null;
  state.reverseTarget = null;
  state.reverseAnswered = false;
  state.zoneFilter = 'all';

  if (state.timerRunning) {
    endSpeedRound();
  }

  // Update tabs
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab[data-mode="${mode}"]`)?.classList.add('active');

  // Init mode
  switch (mode) {
    case 'flashcard':
      newFlashcard();
      break;
    case 'reverse':
      newReverseQuestion();
      break;
    case 'freedraw':
      break;
    case 'speed':
      break;
    case 'zone':
      newFlashcard();
      break;
  }

  renderFretboard();
  renderControlPanel();
}

// ===== SETTINGS TOGGLES =====
function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : '');
  document.getElementById('btnDarkMode').textContent = state.darkMode ? '☀️' : '🌙';
  renderFretboard();
  saveState();
}

function toggleLeftHanded() {
  state.leftHanded = !state.leftHanded;
  const wrap = document.getElementById('fretboardWrap');
  if (state.leftHanded) {
    wrap.classList.add('flipped');
  } else {
    wrap.classList.remove('flipped');
  }
  renderFretboard();
  saveState();
}

function toggleAudio() {
  state.audioEnabled = !state.audioEnabled;
  saveState();
}

function changeTuning(tuning) {
  state.tuning = tuning;
  applyTuning();
  state.userMarks = {};
  state.correctMarks = {};
  state.currentNote = null;
  renderFretboard();
  if (state.mode === 'flashcard' || state.mode === 'zone') newFlashcard();
  if (state.mode === 'reverse') newReverseQuestion();
  renderControlPanel();
  saveState();
}

function resetStats() {
  if (confirm('Reset all progress stats?')) {
    state.noteStats = {};
    state.bestStreak = 0;
    state.streak = 0;
    state.totalAttempts = 0;
    state.correctAttempts = 0;
    state.score = 0;
    saveState();
    renderControlPanel();
  }
}

// ===== INIT =====
function init() {
  loadState();

  // Apply dark mode
  if (state.darkMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('btnDarkMode').textContent = '☀️';
  }

  // Apply left-handed
  if (state.leftHanded) {
    document.getElementById('fretboardWrap').classList.add('flipped');
  }

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => switchMode(tab.dataset.mode));
  });

  // Header buttons
  document.getElementById('btnDarkMode').addEventListener('click', toggleDarkMode);
  document.getElementById('btnSettings').addEventListener('click', () => {
    state.showSettings = !state.showSettings;
    state.showStats = false;
    if (state.showSettings) renderSettings();
    else switchMode(state.mode);
  });
  document.getElementById('btnStats').addEventListener('click', () => {
    state.showStats = !state.showStats;
    state.showSettings = false;
    if (state.showStats) renderStats();
    else switchMode(state.mode);
  });

  // Initial render
  switchMode('flashcard');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
