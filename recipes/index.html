**Cook time:** 10 min
**Calories:** Under 500
**Protein:** 51g

## Ingredients
- Egg whites (enough for a wrap-sized portion)
- Parchment paper
- Quick spray of avocado oil or cooking spray
- Pinch of salt
- Optional: garlic powder, cornstarch, or lemon juice (for wrap structure)
- Ricotta cheese
- Sliced tomato
- Turkey bacon
- 2 fried eggs
- Salt and pepper to taste

- Pickle juice

**Source:** 5-dinners-lean video
**Category:** Dinner (meal prep series)

## Dinner 1: Mushroom & Egg Scramble with Squash (Meat-Free)
**Calories:** 580 | **Protein:** 57g

### Ingredients
- Mushrooms (for volume, low calorie)
- Garlic
- Egg whites (generous amount)
- 2 whole eggs
- Kabocha squash (pre-baked)
- Pressed cottage cheese (crumbled like feta)
- Salt

### Instructions
1. Fry mushrooms in garlic.
2. Add egg whites and 2 eggs, scramble.
3. Add pre-baked kabocha squash.
4. Top with crumbled pressed cottage cheese (acts like feta, 27g protein per half cup).

---

## Dinner 2: Cajun Chicken Bowl with Yogurt Sauce
**Calories:** 454 | **Protein:** 51g | **Fat:** 12g | **Carbs:** 34g

### Ingredients
- Chicken breast, cut into 3 big pieces
- Cajun seasoning (no MSG)
- Coconut oil (1 teaspoon)
- Sweet potato (small amount)
- Arugula
- Cherry tomatoes
- Greek yogurt sauce (see below)

### Yogurt Sauce:
- Organic low-fat Greek yogurt
- Fresh parsley (stems and all)
- Pecorino cheese
- 2 cloves garlic
- Lemon juice
- Salt and pepper
- Water (for consistency)

### Instructions
1. Season chicken with Cajun seasoning generously.
2. Heat cast iron pan on low-medium with coconut oil.
3. Cook chicken 4 minutes per side (Will's trick).
4. Make yogurt sauce: blend yogurt, parsley, pecorino, garlic, lemon, salt, pepper, and water.
5. Build bowl: arugula, sweet potato, cherry tomatoes, chicken, yogurt sauce.

- Even if your travel companions aren't fitness-focused, you have to make it happen.`,"crawfish-bowl":`# 🦞 Crawfish Bowl\n**Prep Time:** 45 min | **Cook Time:** 25 min | **Servings:** 4–6\n\n> **Source:** Texas Cajun style\n> **Difficulty:** Medium (live crawfish require purging)\n\n---\n\n## 🛒 Ingredients\n\n### For the Crawfish Boil\n- 10–15 lbs live crawfish (seasonal, call ahead to reserve)\n- 1 packet Zatarain's or crawfish boil seasoning\n- 1 lemon, halved\n- 2 bay leaves\n\n### For the Vegetables\n- 1 lb baby red potatoes, halved\n- 4–6 ears corn, cut in half (this is critical for the layered spice method)\n- 1 large onion, quartered\n- 2 heads garlic, halved crosswise\n- 2–3 small whole artichokes (optional)\n\n### Optional: Andouille Sausage\n- 1 lb andouille sausage, sliced into ½\" rounds\n- Adds smoky cayenne kick — a boil classic\n\n### Optional: Cheese Tortellini\n- 1 lb cheese tortellini (refrigerated)\n- Soaks up seasoned broth — mild and filling\n\n### For the Garnish & Table-Side Heat\n- Melted butter\n- Hot sauce (Crystal, Louisiana, or Tabasco)\n- Lemon wedges\n- Fresh parsley or green onions, chopped\n- Cayenne butter (½ cup melted butter + 1 tbsp cayenne — see Layered Seasoning below)\n\n---\n\n## 🌡️ Layered Seasoning (Mild + Spicy from One Pot)\n\n> **Key principle:** You can't UN-spice a crawfish, but you can always add more. Start mild, soak longer for heat — everyone gets what they want.\n\nThis method lets you serve both mild and spicy eaters from a SINGLE pot. The trick is controlling **soak time** and using **table-side heat boosters**.\n\n### The System\n\n| Item | Mild Eaters | Spicy Eaters |\n|------|------------|--------------|\n| **Boil seasoning** | Use ⅔ packet (≈60–70% of full strength) | Same pot — heat comes from soak time and sides |\n| **Crawfish** | Pull after 10 min soak | Leave 20–25 min in the spicy soak |\n| **Corn** (halved cobs) | Pull half the cobs at 10 min | Leave other half 15 min longer in spiced liquid |\n| **Potatoes** | Pull mild half after cooking | Pull spicy half, cut in half, toss with cayenne butter (see below) |\n| **Andouille** (if using) | Serves as-is — already has kick | Extra hot sauce at the table |\n| **Tortellini** (if using) | Mild — absorbs broth flavor | Add hot sauce or cayenne butter at the table |\n\n### Cayenne Butter (Spicy Table-Side Booster)\n1. Melt ½ cup butter\n2. Stir in 1 tbsp cayenne pepper, 1 tsp garlic powder, squeeze of lemon\n3. Pour into small bowls at the table — spicy eaters drizzle this over everything\n\n---\n\n## 📝 Instructions\n\n### Step 1: Purge the Crawfish\n\n> **⚠️ Don't skip this.** Live crawfish purge mud and debris from their gills. A proper purge means clean, better-tasting crawfish.\n\n1. Empty the sack into a large cooler or clean ice chest.\n2. Pick out and discard any dead crawfish (straight tails, no movement). A few dead is normal; if more than a handful are dead, contact your supplier.\n3. Fill the cooler with fresh cold water, enough to cover all crawfish. Stir gently with your hands or a paddle.\n4. Drain the dirty water immediately. Repeat this rinse 2–3 times until the water runs mostly clear.\n5. **Final purge:** Fill the cooler one more time, add ½ cup of salt, and let them soak for **10 minutes** — this draws out mud from their gills.\n6. Drain and rinse one more time. The crawfish should be lively and clean. Keep them in the cooler with the drain open — don't let them sit in water.\n\n### Step 2: Prep\n\n7. Halve the potatoes. Cut corn cobs **in half** — this is critical for the layered method (you'll pull half early for mild, leave half for spicy).\n8. Quarter the onion, halve the garlic heads crosswise.\n9. **If using andouille:** Slice into ½\" rounds.\n10. **If using tortellini:** Keep refrigerated until ready — add at the end (see Step 4).\n11. Mix the cayenne butter: melt ½ cup butter, stir in 1 tbsp cayenne and 1 tsp garlic powder. Set aside in bowls for the table.\n\n### Step 3: Build the Boil (Mild Base)\n\n12. Fill your boil pot (30 qt minimum for a 10 lb sack; 40–60 qt for 15+ lbs) with water to about ⅔ full. Add **⅔ of the boil seasoning packet** (save the rest), halved lemon, and bay leaves.\n13. Bring to a rolling boil over high heat (this takes 15–20 minutes on a propane burner).\n\n### Step 4: Cook in Stages\n\n14. Add potatoes and onion. Boil for 10 minutes.\n15. Add corn. **If using andouille, add it now.** Boil for 10 more minutes.\n16. Add the purged live crawfish. Stir to submerge, bring back to a boil, and boil for 5 minutes.\n17. **If using tortellini:** Add tortellini now. Boil for 2–3 minutes until they float and are tender.\n18. **Turn off the heat.** The crawfish are done boiling — now it's all about the soak.\n\n### Step 5: The Layered Soak (Mild vs Spicy)\n\n19. **Start the timer.** This is where mild and spicy diverge:\n\n**For Mild Eaters (pull at 10 minutes):**\n20. At the 10-minute mark, use a strainer or tongs to pull out:\n    - About half the crawfish (set aside in a bowl, cover loosely with foil)\n    - Half the corn cobs\n    - Half the potatoes\n    - Andouille or tortellini (pull now — they don't need extra soak)\n    - Transfer to a serving tray, cover loosely with foil\n\n**For Spicy Eaters (add boost, soak 20–25 minutes):**\n21. While the mild portions are being pulled, add to the remaining pot:\n    - The **remaining ⅓ of the seasoning packet**\n    - An extra tablespoon of cayenne pepper (or to taste)\n    - Stir gently — the liquid will get noticeably more orange/red\n22. Let the remaining crawfish, corn, potatoes, and veggies soak for another 10–15 minutes (20–25 min total soak).\n\n### Step 6: Serve\n\n23. Pile everything on a newspaper-lined table.\n24. **Mild side:** Mild crawfish, corn, potatoes, andouille or tortellini. Drizzle with plain butter, squeeze lemon, garnish with parsley.\n25. **Spicy side:** Spicy-soaked crawfish, corn, potatoes. Drizzle with **cayenne butter**, add hot sauce, squeeze lemon.\n\n### Table-Side Customization\n- Extra hot sauce bottles (Crystal, Louisiana, Tabasco)\n- Cayenne butter for drizzling\n- Extra lemon wedges\n- Tony Chachere's or Slap Ya Mama for shaking on top\n\n---\n\n## 💡 Tips\n\n- **Live crawfish season** runs roughly January–June in Texas. Call ahead to your seafood counter to reserve. Plan on 3–5 lbs per person.\n- **Purging is non-negotiable** with live crawfish. The salt soak draws out mud from their gills. Skip this and your boil will taste like the swamp.\n- **Dead crawfish must go.** Toss any that are straight-tailed and unresponsive before boiling. They spoil the batch.\n- **Andouille** brings smoky cayenne heat that fits the boil tradition. **Tortellini** is a great milder alternative — cheese-filled pasta soaks up the seasoned broth without adding spice. Use one, both, or neither — your call.\n- **Tortellini timing:** Add tortellini **late** — they only need 2–3 minutes. If they go in too early they'll burst and turn to mush. Add them right after the crawfish come to a boil.\n- **Cut corn in half** — this is the #1 secret to the layered spice method. Halved cobs let you pull mild portions cleanly while leaving the rest to soak up extra heat.\n- **Potatoes are sponges** — they absorb seasoning during the boil but can't easily be re-spiced from the outside. For spicy eaters: pull them, cut in half, and toss with cayenne butter. The cut surface absorbs the heat fast.\n- **Soak time = spice level.** Crawfish absorb most of their heat during the soak, not the boil. 10 minutes mild, 20–25 spicy.\n- **Make it a boil plate:** Spread everything on a newspaper-lined table for the authentic Louisiana experience.\n- **Leftovers:** Store in the fridge for up to 3 days. Spicy-soaked leftovers are even better the next day — peeled crawfish tails make amazing étouffée.\n\n---\n\n## 🏪 Shopping List\n\n- [ ] Live crawfish (10–15 lbs — call ahead to reserve, seasonal Jan–Jun)\n- [ ] Crawfish boil seasoning (Zatarain's or store brand) — 1 packet, use ⅔ then remaining ⅓\n- [ ] Baby red potatoes (1 lb bag)\n- [ ] Corn on the cob (4–6 ears — you'll cut them in half)\n- [ ] Yellow onion (1 large)\n- [ ] Garlic (2 heads)\n- [ ] Lemon (2–3 — one for the boil, extra for squeezing)\n- [ ] Salt (for purging — kosher or table salt)\n- [ ] Cayenne pepper (need extra for the butter and spicy soak)\n- [ ] Butter (need ½ cup+ for cayenne butter plus table butter)\n- [ ] Hot sauce (Crystal or Louisiana brand)\n- [ ] Garlic powder (for cayenne butter)\n- [ ] Fresh parsley or green onions\n- [ ] Newspaper (for the table)\n- [ ] Andouille sausage (1 lb) — *optional*\n- [ ] Cheese tortellini (1 lb, refrigerated) — *optional*`};
var cur=null;
var curCat=null;

var CATS=[{id:'breakfasts',label:'Breakfasts',e:'🌅'},{id:'lunches',label:'Lunches',e:'🥗'},{id:'dinners',label:'Dinners',e:'🍽️'},{id:'desserts',label:'Desserts',e:'🍰'},{id:'snacks',label:'Snacks',e:'🥨'},{id:'full-days',label:'Full Day Plans',e:'📅'},{id:'parties',label:'Parties',e:'🎉'}];

function init(){
  showCategories();
}

function showCategories(){
  curCat=null;
  cur=null;
  var h="";
  for(var c=0;c<CATS.length;c++){
    var cat=CATS[c];
    var count=RECIPES.filter(function(r){return r.category===cat.id}).length;
    if(count===0)continue;
    h+='<div class="cat-card" onclick="showCategory(\''+cat.id+'\')">';
    h+='<div class="cat-emoji">'+cat.e+'</div>';
    h+='<div class="cat-label">'+cat.label+'</div>';
    h+='<div class="cat-count">'+count+' recipe'+(count!==1?'s':'')+'</div></div>';
  }
  document.getElementById('cards').innerHTML=h;
  document.getElementById('cards').className='cards';
  document.getElementById('detail-bar').style.display='none';
  document.getElementById('viewer').innerHTML='<div class="viewer-placeholder">Select a category to browse recipes</div>';
  document.getElementById('page-title').textContent='Recipes';
  document.getElementById('page-sub').textContent='Family favorites';
  if(location.hash){history.replaceState(null,'','/recipes/');}
}

function showCategory(catId){
  curCat=catId;
  cur=null;
  var cat=CATS.find(function(c){return c.id===catId});
  var items=RECIPES.filter(function(r){return r.category===catId});
  var h="";
  for(var i=0;i<items.length;i++){
    var r=items[i];
    h+='<div class="card" onclick="pick(\''+r.id+'\')" id="c-'+r.id+'">';
    h+='<div class="card-emoji">'+r.e+'</div>';
    h+='<div class="card-title">'+r.title+'</div>';
    h+='<div class="card-sub">'+r.sub+'</div></div>';
  }
  document.getElementById('cards').innerHTML=h;
  document.getElementById('cards').className='cards';
  document.getElementById('detail-bar').style.display='block';
  document.getElementById('viewer').innerHTML='<div class="viewer-placeholder">Select a recipe to view</div>';
  document.getElementById('page-title').textContent=cat.label;
  document.getElementById('page-sub').textContent=items.length+' recipe'+(items.length!==1?'s':'');
  location.hash='#cat-'+catId;
}

function showRecipes(){
  if(curCat){
    showCategory(curCat);
  }else{
    showCategories();
  }
}

function pick(id){
  var old=document.getElementById("c-"+cur);
  if(old)old.classList.remove("active");
  cur=id;
  var el=document.getElementById("c-"+id);
  if(el)el.classList.add("active");
  var md=DATA[id];
  var v=document.getElementById("viewer");
  if(md&&typeof marked!=="undefined"){
    v.innerHTML='<div class="md fade">'+marked.parse(md)+'</div>';
    v.scrollIntoView({behavior:"smooth",block:"start"});
  }else if(md){
    v.innerHTML='<div class="md fade"><pre style="white-space:pre-wrap">'+md.replace(/</g,'&lt;')+'</pre></div>';
    v.scrollIntoView({behavior:"smooth",block:"start"});
  }else{
    v.innerHTML='<div class="viewer-placeholder">Recipe not available</div>';
  }
  document.getElementById('detail-bar').style.display='block';
  var r=RECIPES.find(function(r){return r.id===id});
  document.getElementById('page-title').textContent=r.title;
  document.getElementById('page-sub').textContent='Recipe details';
  location.hash='#'+id;
}

init();
if(location.hash){
  var h=location.hash.slice(1);
  if(h.startsWith('cat-')){
    showCategory(h.slice(4));
  }else if(RECIPES.find(function(r){return r.id===h})){
    // deep link to a recipe: show its category first, then pick it
    var recipe=RECIPES.find(function(r){return r.id===h});
    showCategory(recipe.category);
    pick(h);
  }
}
</script>
</body>
</html>
